#parameter strings that appear in Documentation page
FILTER_TYPE_DISPLAY_NAME = Filter type
STAGES_DISPLAY_NAME = Number of stages
D_DELAY_DISPLAY_NAME = Differential delay

VRC_EN_DISPLAY_NAME = Enable variable rate change factor
RCF_FIX_DISPLAY_NAME = Rate change factor
RCF_LB_DISPLAY_NAME = Minimum rate change factor
RCF_UB_DISPLAY_NAME = Maximum rate change factor
INTERFACES_DISPLAY_NAME = Number of interfaces
CH_PER_INT_DISPLAY_NAME = Number of channels per interface
INT_USE_MEM_DISPLAY_NAME = Map integrator data storage to memory
INT_MEM_DISPLAY_NAME = Integrator data storage type
REQ_INT_MEM_DISPLAY_NAME = RAM type used for integrator data storage
DIF_USE_MEM_DISPLAY_NAME = Map differentiator data storage to memory
DIF_MEM_DISPLAY_NAME = Differentiator data storage type
REQ_DIF_MEM_DISPLAY_NAME = RAM type used for differentiator data storage
CLK_EN_DISPLAY_NAME = Use clock enable port


FILTER_TYPE_DESCRIPTION = Determines which section of the CIC should be calculated at a lower rate
STAGES_DESCRIPTION = Number of integration and differentiation stages
D_DELAY_DESCRIPTION = The length of the delay in the differentiator stages
VRC_EN_DESCRIPTION = Chose whether the rate change factor can be set at runtime (using a conduit port)
RCF_FIX_DESCRIPTION = The factor by which the input will down/upsampled
RCF_LB_DESCRIPTION = Lower bound of the factor by which the system can up/downsampled
RCF_UB_DESCRIPTION = Upper bound of the factor by which the system can up/downsampled
INTERFACES_DESCRIPTION = Number of parallel interfaces across which independant channels will be split
CH_PER_INT_DESCRIPTION = Number of independent data channels per interface on the multi-interface port of the CIC
REQ_INT_MEM_DESCRIPTION = Specifies the type of resources to be used in the integrator
REQ_DIF_MEM_DESCRIPTION = Specifies the type of resources to be used in the differentiator
REQ_PIPELINE_DESCRIPTION = Extra pipelining stages to be used within each integrator stage
IN_WIDTH_DESCRIPTION = Bit width of the input stream
CLK_EN_PORT_DESCRIPTION = Use Clock Enable Port to suspend operation of core. Enabling this setting is deprecated and it will be removed in a future release
ROUND_TYPE_DESCRIPTION = Method used for rounding output to given data width
REQ_OUT_WIDTH_DESCRIPTION = Bit width of the output stream
#WARNING Messages

CLK_EN_WARNING = Clock Enable Port is deprecated and may be removed in a future release
H_PRUNE_INT_WARNING = Hogenauer Pruning is only supported for decimation filters

#Error messages

MIN_GREATER_THAN_MAX_RATE_ERROR = <b>Maximum rate change</b> ($rate_change_ub) must be greater than <b>Minimum rate change</b> ($rate_change_lb)
RATE_GRATER_THAN_INTERFACES_ERROR = <b>Rate change</b> ($rate_change_factor) must be greater than or equal to <b>Number of interfaces</b> ($number_of_interfaces)
MIN_RATE_GRATER_THAN_INTERFACES_ERROR = <b>Minimum Rate change</b> ($rate_change_lb) must be greater than or equal to <b>Number of interfaces</b> ($number_of_interfaces)
TOTAL_CHANNELS_ERROR = Total number of channels ($total_channels) must be less than 1024
PIPELINE_GREATER_THAN_CHANNELS_ERROR = <b>Pipelining stages per integrator</b> ($pipelining_depth) cannot be deeper than the number of <b>Channels per interface</b> ($channels_per_interface)
MAX_PIPELINE_DEPTH = <b>Pipelining stages per integrator</b> ($pipelining_depth) cannot be deeper than 4
MAX_OUTPUT_ERROR = <b>Output width</b> ($requested_output_width) must be less than full precision ($max_output_width) to allow rounding
RATE_CHANGE_LESS_THAN_2_ERROR = <b>Rate change</b> ($rate_change_factor) must be greater than 2
MAX_RATE_CHANGE_LESS_THAN_2_ERROR = <b>Maximum rate change</b> ($rate_change_ub) must be greater than 2
MIN_RATE_CHANGE_LESS_THAN_2_ERROR = <b>Minimum rate change</b> ($rate_change_lb) must be greater than 2
OUTPUT_WIDTH_ERROR = <b>Output Width</b> ($requested_output_width) must be positive
DIF_WRONG_MEM_TYPE_ERROR = <b>Differentiator memory type</b> ($differentiator_data_store_mem_type) selected is not supported on this device. Allowed values are - $mem_display
INT_WRONG_MEM_TYPE_ERROR = <b>Integrator memory type</b> ($integrator_data_store_mem_type) selected is not supported on this device. Allowed values are - $mem_display
JAVA_ERROR = Java Helper returned unexpected output
EXAMPLE_DESIGN_TB_ERROR = Generation of testbench files failed
EXAMPLE_DESIGN_SYS_ERROR = Generation of CIC system failed. Testbench cannot be generated


