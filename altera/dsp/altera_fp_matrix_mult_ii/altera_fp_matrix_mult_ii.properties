#memory
FP_FORMAT_DESCRIPTION = Data format of values in the matrices. When a complex matrix multiplication is performed, matrix values communicated on the Avalon-ST interfaces are a pair of floating-point values of the specified format, with the real part occupying the low-order bits.  
MULTIPLICATION_TYPE_DESCRIPTION = Complex multiplication implies that each matrix element contains a real and imaginary value of the specified format. Karatsuba multiplication of complex numbers reduces DSP block usage at the cost of higher latency and increased logic use. It is most useful when the matrices contain double-precision complex values.  
VECTOR_SIZE_DESCRIPTION = The size of the dot product which can be computed in parallel. Where the number of columns of matrix A and rows of matrix B are greater than vector size a number of iterations are required to compute a full dot product.
NUM_BLOCKS_DESCRIPTION = This controls the memory configuration of the matrix A storage. Increasing this number increases the memory bandwidth and the number of memory blocks used. Use a value greater than 1 for best performance when the dot vector size is greater than the number of columns in matrix B. 
OPTIMIZATION_DESCRIPTION = Controls the insertion of registers in the core's internal data paths. Area optimization minimises the number of inserted registers, Frequency optimization aims for the maximum possible frequency, while the Balanced option has the objective of generally good performance without excessive resource utilization. To minimise logic utilization, also reduce Memory Blocks.
A_ROWS_DESCRIPTION =  Number of rows in matrix A.
A_COLUMNS_DESCRIPTION = Number of columns in matrix A.
B_ROWS_DESCRIPTION =  Number of rows in matrix A.
B_COLUMNS_DESCRIPTION = Number of columns in matrix B.

#Messages
INCORRECT_COLS_VEC_RATIO_MSG = The number of columns in matrix A must be an integer multiple of the vector size
INCORRECT_VEC_BLOCK_RATIO_MSG = The vector size must be an integer multiple of the number of memory blocks
VEC_SIZE_MUST_BE_LARGER_THAN_NUM_BLOCK_MSG = The vector size must be larger than the number of memory blocks
NUM_BLOCKS_MUST_BE_GEQ_TO_VEC_SIZE_OVER_B_COLS = The number of memory blocks must be larger than or equal to the ratio of vector size over the number of columns in matrix B

