DISPLAY_NAME = FFT II
DESCRIPTION  = Altera Fast Fourier Transform II
GROUP = DSP/Transforms
AUTHOR = Altera Corporation

DOCUMENTATION_LINK_NAME = User Guide
DOCUMENTATION_LINK = https://documentation.altera.com/#/link/hco1419012539637/hco1419012438961

#parameter strings that appear in Documentation page.
LENGTH_DISPLAY_NAME = Length
LENGTH_DESCRIPTION = The transform length or the maximum transform length if variable streaming data flow. 
DATA_FLOW_DISPLAY_NAME = Data Flow
DATA_FLOW_DESCRIPTION = Data flow architectures trade-off throughput and features against resource requirements.
DATA_FLOW_LONG_DESCRIPTION = Data flow architectures trade-off throughput and features against resource requirements: <UL><LI>Variable Streaming architecture provides continuous processing of transforms and run time control of the transform length</LI><LI>Streaming architecture provides continuous processing of transforms</LI><LI>Buffered Burst architecture requires fewer memory resource than the streaming architecture at the expense of lower average throughput</LI><LI>Burst architecture requires the fewest memory resources at the expense of the lowest average throughput</LI></UL> 
DIRECTION_DISPLAY_NAME = Direction
DIRECTION_DESCRIPTION = The direction of the transform. Bi-directional will allow run time control of the transform direction.
DATA_REP_DISPLAY_NAME = Representation
DATA_REP_DESCRIPTION = Number representation of data and twiddle factors
IN_WIDTH_DISPLAY_NAME = Data Input Width
IN_WIDTH_DESCRIPTION = Data input width
OUT_WIDTH_DISPLAY_NAME = Data Output Width
OUT_WIDTH_DESCRIPTION = Data output width
TWID_WIDTH_DISPLAY_NAME = Twiddle Width
TWID_WIDTH_DESCRIPTION = Twiddle width
IN_ORDER_DISPLAY_NAME = Input Order
IN_ORDER_DESCRIPTION = The order of the input data
OUT_ORDER_DISPLAY_NAME = Output Order
OUT_ORDER_DESCRIPTION = The order of the output data
ENGINE_ARCH_DISPLAY_NAME = Architecture
ENGINE_ARCH_DESCRIPTION = The throughput of the internal butterfly. Quad output produces all four radix-4 butterfly outputs in parallel.
NUM_ENGINES_DISPLAY_NAME = Number of Parallel Engines
NUM_ENGINES_DESCRIPTION = The number of parallel engines
HARD_FP_DISPLAY_NAME = Enable Hard Floating Point Blocks
HARD_FP_DESCRIPTION = Map Floating Point calculations to the Hard Floating Point DSP Resources
DSP_RESOURCE_OPT_DISPLAY_NAME = DSP Block Resource Optimization
DSP_RESOURCE_OPT_DESCRIPTION = Use new DSP Modes (complex 18x25 and 27x27) at the possible expense of slower frequency
HYPER_OPT_DISPLAY_NAME = Hyper Optimization
HYPER_OPT_DESCRIPTION = Enable hyper optimization for Stratix 10 (Can be evaluated on S10 early access model of Arria 10 family)
CALC_LATENCY_DISPLAY_NAME = Calculation Latency
CALC_LATENCY_DESCRIPTION = Number of cycles the FFT takes to perform the Calculation
THROUGHPUT_LATENCY_DISPLAY_NAME = Throughput Latency
THROUGHPUT_LATENCY_DESCRIPTION = Number of cycles from data in to data out
