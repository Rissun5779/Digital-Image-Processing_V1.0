# Parameters
# If no _LONG_DESCRIPTION property exists then the _DESCRIPTION property will be used in its place
# If _LONG_DESCRIPTION starts with "+" then the DESCRIPTION is prepended to the start

DEVICEFAMILY_DISPLAY = Device Family
DEVICEFAMILY_DESCRIPTION = FIR Compiler II takes advantage of specific features of the device family.

FILTERTYPE_DISPLAY = Filter Type
FILTERTYPE_DESCRIPTION = Specifies the type of FIR filter.
FILTERTYPE_SINGLE = Single Rate
FILTERTYPE_INTERP = Interpolation
FILTERTYPE_DECIM = Decimation
FILTERTYPE_FRAC = Fractional Rate

INTERPFACTOR_DISPLAY = Interpolation Factor
INTERPFACTOR_DESCRIPTION = Specifies the number of extra points to generate between the original samples.

DECIMFACTOR_DISPLAY = Decimation Factor
DECIMFACTOR_DESCRIPTION = Specifies the number of data points to remove between the original samples.

L_BANDSFILTER_DISPLAY = L-th Band Filter
L_BANDSFILTER_DESCRIPTION = Specifies the appropriate L-band Nyquist filters. Every Lth coefficient of these filters is zero, counting out from the center tap.
L_BANDSFILTER_1 = All taps
L_BANDSFILTER_2 = Half band
L_BANDSFILTER_3 = 3rd
L_BANDSFILTER_4 = 4th
L_BANDSFILTER_5 = 5th

CLOCKRATE_DISPLAY = Clock Rate
CLOCKRATE_DESCRIPTION = Specifies the frequency of the input clock.

CLOCKSLACK_DISPLAY = Clock Slack
CLOCKSLACK_DESCRIPTION = Enables you to control the amount of pipelining independently of the clock frequency and therefore independently of the clock to sample rate ratio.

SPEEDGRADE_DISPLAY = Speed Grade
SPEEDGRADE_DESCRIPTION = Specifies the speed grade of the target device to balance the size of the hardware against the resources required to meet the clock frequency.
SPEEDGRADE_FAST = Fast
SPEEDGRADE_MEDIUM = Medium
sPEEDGRADE_SLOW = Slow

COEFFRELOAD_DISPLAY = Coefficients Reload
COEFFRELOAD_DESCRIPTION = Turn on this option to allow coefficient reloading. This option allows you to change coefficient values during run time. When this option is turned on, additional input ports are added to the filter.

BASEADDRESS_DISPLAY = Base Address
BASEADDRESS_DESCRIPTION = Specifies the base address of the memory-mapped  coefficients.

READWRITEMODE_DISPLAY = Read/Write Mode
READWRITEMODE_DESCRIPTION = Specifies the read and write mode that determines the type of address decode to build.
READWRITEMODE_READ = Read
READWRITEMODE_WRITE = Write
READWRITEMODE_READ_WRITE = Read/Write

BACKPRESSURE_DISPLAY = Back Pressure Support
BACKPRESSURE_DESCRIPTION = Turn on this option to enable backpressure support. When this option is turned on, the sink signals the source to stop the flow of data when its FIFO buffers are full or when there is congestion on its output port.

SYMMETRYMODE_DISPLAY = Symmetry
SYMMETRYMODE_DESCRIPTION = Symmetry
SYMMETRYMODE_NSYM = Non Symmetry
SYMMETRYMODE_SYM = Symmetrical
SYMMETRYMODE_ASYM = Anti-Symmetrical

DELAYRAMBLOCKTHRESHOLD_DISPLAY = Memory Block Threshold
DELAYRAMBLOCKTHRESHOLD_DESCRIPTION = Specifies the balance of resources between LEs/Small RAM block threshold in bits.

DUALMEMDISTRAMTHRESHOLD_DISPLAY = Dual Port RAM Threshold
DUALMEMDISTRAMTHRESHOLD_DESCRIPTION = Specifies the balance of resources between small to medium RAM block threshold in bits.

MRAMTHRESHOLD_DISPLAY = Large RAM Threshold
MRAMTHRESHOLD_DESCRIPTION = Specifies the balance of resources between medium to large RAM block threshold in bits.

HARDMULTIPLIERTHRESHOLD_DISPLAY = Hard Multiplier Threshold
HARDMULTIPLIERTHRESHOLD_DESCRIPTION = Specifies the balance of resources between LEs/ DSP block multiplier threshold in bits. The default value is -1.

INPUTRATE_DISPLAY = Input Sample Rate (MSPS)
INPUTRATE_DESCRIPTION = Specifies the sample rate of the incoming data.

INPUTCHANNELNUM_DISPLAY = Max Number of Channels
INPUTCHANNELNUM_DESCRIPTION = Specifies the number of unique input channels to process.

INPUTTYPE_DISPLAY = Input Type
INPUTTYPE_DESCRIPTION = Specifies whether the input data is in a signed binary or a signed fractional binary format. Select Signed Fractional Binary to monitor which bits the IP core preserves and which bits it removes during the filtering process.
INPUTTYPE_INT = Signed Binary
INPUTTYPE_FRAC = Signed Fractional Binary


RECONFIGURABLE_DISPLAY = Reconfigurable Carrier Mode
RECONFIGURABLE_DESCRIPTION = Turn on to implement a reconfigurable FIR filter.
CHANNELMODES_DISPLAY = Channel Mode Order
CHANNELMODES_DESCRIPTION = Edit the mapping. For example, for 0,1,2,3, the second element of mode 1 is 1, which means the IP core processes channel 1 on the second cycle, when you set the FIR to mode 1.
NUM_MODES_DISPLAY = Number of Modes
NUM_MODES_DESCRIPTION = Enter the number of modes.
RECONFIGURABLE_LIST_DISPLAY = Choose Mode to Edit
RECONFIGURABLE_LIST_DESCRIPTION = Select the mode to edit.

INPUTBITWIDTH_DISPLAY = Input Width
INPUTBITWIDTH_DESCRIPTION = Specifies the width of the input data sent to the filter.

INPUTFRACBITWIDTH_DISPLAY = Input Fractional Width
INPUTFRACBITWIDTH_DESCRIPTION = Specifies the width of the data input into the filter when you select Signed Fractional Binary as your input data type.

COEFFSETREALVALUE_DISPLAY = Real Coefficient Values

COEFFSETREALVALUEIMAG_DISPLAY = Real Coefficient Values (Imaginary Component)

COEFFNUM_DISPLAY = Number of Coefficients

COEFFSETSCALEVALUE_DISPLAY = Scaled Coefficient Values

COEFFSETSCALEVALUEIMAG_DISPLAY = Scaled Coefficient Values (Imaginary Component)

COEFFSETFIXEDVALUE_DISPLAY = Fixed-point Coefficient Values

COEFFSETFIXEDVALUEIMAG_DISPLAY = Fixed-point Coefficient Values (Imaginary Component)

COEFFTYPE_DISPLAY = Coefficient Data Type
COEFFTYPE_DESCRIPTION = Specifies the coefficient input data type. Select Signed Fractional Binary to monitor which bits are preserved and which bits are removed during the filtering process.
COEFFTYPE_INT = Signed Binary
COEFFTYPE_FRAC = Signed Fractional Binary

COEFFSCALING_DISPLAY = Coefficient Scaling
COEFFSCALING_DESCRIPTION = Specifies the coefficient scaling mode. Select Auto to apply a scaling factor in which the maximum coefficient value equals the maximum possible value for a given number of bits. Select None to read in pre-scaled integer values for the coefficients and disable scaling.
COEFFSCALING_AUTO = Auto
COEFFSCALING_NONE = None

COEFFCOMPLEX_DISPLAY = Complex Coefficients
COEFFCOMPLEX_DESCRIPTION = Complex Coefficients
KARATSUBA_DISPLAY = Karatsuba Implementation
KARATSUBA_DESCRIPTION = Select Karatsuba Implementation using 3 multipliers per complex multiply rather than 4. 

COEFFBITWIDTH_DISPLAY = Coefficient Width
COEFFBITWIDTH_DESCRIPTION = Specifies the width of the coefficients. The default value is 8 bits.

COEFFFRACBITWIDTH_DISPLAY = Coefficient Fractional Width
COEFFFRACBITWIDTH_DESCRIPTION = Specifies the width of the coefficient data input  into the filter when you select Signed Fractional Binary as your coefficient data type.

OUTTYPE_DISPLAY = Output Type
OUTTYPE_DESCRIPTION = Specifies whether the output data is in a signed binary or a signed fractional binary format. Select Signed Fractional Binary to monitor which bits the IP core preserves and which bits it removes during the filtering process.
OUTTYPE_INT = Signed Binary
OUTTYPE_FRAC = Signed Fractional Binary

OUTBITWIDTH_DISPLAY = Output Width
OUTBITWIDTH_DESCRIPTION = Specifies the width of the output data (with limited precision) from the filter.

OUTFRACBITWIDTH_DISPLAY = Output Fractional Width
OUTFRACBITWIDTH_DESCRIPTION = Specifies the width of the output data (with limited precision) from the filter when you select Signed Fractional Binary as your output data.

OUTMSBROUND_DISPLAY = Specifies whether to truncate or saturate the most significant bit (MSB).
OUTMSBROUND_DESCRIPTION = MSB Rounding
OUTMSBROUND_TRUNC = Truncation
OUTMSBROUND_SAT = Saturating

OUTMSBBITREM_DESCRIPTION = Specifies the number of MSB bits to truncate or saturate. The value must not be greater than its corresponding integer bits or fractional bits.
OUTMSBBITREM_DISPLAY = MSB Bits to Remove

OUTLSBROUND_DESCRIPTION = LSB Rounding
OUTLSBROUND_DISPLAY = Specifies whether to truncate or round the least significant bit (LSB).
OUTLSBROUND_TRUNC = Truncation
OUTLSBROUND_ROUND = Rounding

OUTLSBBITREM_DISPLAY = LSB Bits to Remove
OUTLSBBITREM_DESCRIPTION = Specifies the number of LSB bits to truncate or round. The value must not be greater than its corresponding integer bits or fractional bits.

OUTFULLBITWIDTH_DISPLAY = Output Full Width
OUTFULLBITWIDTH_DESCRIPTION = Specifies the width of the output data (with limited precision) from the filter.

OUTFULLFRACBITWIDTH_DISPLAY = Output Full Fractional Width
OUTFULLFRACBITWIDTH_DESCRIPTION = Specifies the width of the output data (with limited precision) from the filter when you select Signed Fractional Binary as your output data.

INPUTINTERFACENUM_DISPLAY = Number of Parallel Input Symbols
INPUTINTERFACENUM_DESCRIPTION = Number of Parallel Input Symbols

OUTPUTINTERFACENUM_DISPLAY = Number of Parallel Output Symbols

CHANPERINPUTINTERFACE_DISPLAY = Number of Channels per Input Interface

CHANPEROUTPUTINTERFACE_DISPLAY = Number of Channels per Output Interface

BANKCOUNT_DISPLAY = Number of Coefficient Banks

BANKDISPLAY_DISPLAY = Show Coefficient Bank

LUTCOUNT_DISPLAY = Number of LUTs
DSPCOUNT_DISPLAY = Number of DSPs
MEMBITCOUNT_DISPLAY = Number of Memory Bits
2
# Error messages
ERROR_BANK_ALL_ZEROS = Invalid coefficient on bank $bank, make sure they are not all zeros.

ERROR_ALL_ZEROS = All of the filter coefficients are zero. You should either change the coefficient scaling or import non-zero coefficients.

ERROR_FIR_IP_API_CREATING_CORE = Error when creating FIR core

ERROR_FIR_IP_API_CREATING_VHDL = There is an error when performing VHD code generation

ERROR_FIR_IP_API_UNKNOWN = There is an unknown error

ERROR_FIR_IP_API_WRONG_NUM = Got $funcResultListLength return values when expecting 12 from fir_ip_api executable

ERROR_INVALID_CLOCK_FREQ = Clock Frequency must be greater than 0 MHz and less than or equal to 600 MHz

ERROR_SINGLE_RATE_BAD_INTERP_DECIM = When Filter Type is Single Rate, Interpolation Factor and Decimation Factor must be 1

ERROR_DECIM_BAD_INTERP = When Filter Type is Decimation, Decimation Factor must be greater than 1 and Interpolation Factor must be 1

ERROR_INTERP_BAD_DECIM = When Filter Type is Interpolation, Decimation Factor must be 1 and Interpolation Factor must be greater than 1

ERROR_FRAC_BAD_INTERP_DECIM = When Filter Type is Fractional Rate, Decimation Factor must be greater than 1 and Interpolation Factor must be greater than 1

ERROR_INPUT_INT_BAD_WIDTH_AND_FRAC = When Input Data Type is Signed Binary, Input Bit Width must be greater than 0 and Input Fractional Bit Width must be 0

ERROR_INPUT_FRAC_BAD_FRAC_WIDTH = Input Fractional Bit Width must be less than Input Bit Width minus the sign bit

ERROR_COEFF_INT_BAD_WIDTH_AND_FRAC = When Coefficient Data Type is Signed Binary, Coefficient Bit Width must be greater than 0 and Coefficient Fractional Bit Width must be 0

ERROR_COEFF_FRAC_BAD_TOTAL_WIDTH = Coefficient Bit Width must not be less than $totalWidth bits

ERROR_COEFF_FRAC_BAD_FRAC_WIDTH = When Coefficient Data Type is Signed Fractional Binary, Coefficient Fractional Bit Width must be greater than 0

ERROR_OUT_FRAC_OTHERS_MUST_BE_FRAC = When Output Data Type is Signed Fractional Binary, both Coefficient Data Type and Input Data Type must also be set to Signed Fractional Binary

ERROR_OUT_WIDTH_MORE_THAN_FULL = Output Full Bit Width should be greater than Output bit width

ERROR_OUT_FRAC_WIDTH_MORE_THAN_FULL_FRAC = Output Fractional Full Bit Width should greater than Output Fractional bit width   

ERROR_CHANS_OUT_OF_RANGE = Number of Channels range from 1-1024

ERROR_IN_RATE_OUT_OF_RANGE = Input Sample Rate must be greater than 0 and less than or equal to 10000

ERROR_CLOCK_RATE_OUT_OF_RANGE = Input Sample Rate/Clock Frequency should be less than 100

ERROR_COEFF_WIDTH_TOO_HIGH = Total coefficient bit width must be less than 32 bits.

ERROR_TOO_MANY_FRAC_LSB_BITS = When Output Type is Signed Fractional Binary, the LSB Bits to Remove must be less than Output Full Fractional Bit Width

ERROR_TOO_MANY_FRAC_MSB_BITS = When Output Type is Signed Fractional Binary, the MSB Bits to Remove must be less than Integer Bit Width (Output Full Bit Width - Output Full Fractional Bit Width)

ERROR_OUTPUT_WIDTH_TOO_SMALL = Output Bit Width should be greater than 1

ERROR_FILTER_CREATION_FAILURE = Filter wasn't successfully created
