# Parameters
# If no _LONG_DESCRIPTION property exists then the _DESCRIPTION property will be used in its place
# If _LONG_DESCRIPTION starts with "+" then the DESCRIPTION is prepended to the start

ARCH_DISPLAY = Generation Algorithm
ARCH_SMALL_ROM = Small ROM
ARCH_LARGE_ROM = Large ROM
ARCH_CORDIC = CORDIC
ARCH_TRIG = Multiplier-Based
ARCH_DESCRIPTION = Architecture for converting the phase into an amplitude.
ARCH_LONG_DESCRIPTION = + Each architecture has different trade-offs:<UL><LI>Large ROM gives the greatest accuracy but requires the most memory.</LI><LI>Small ROM uses an eigth of the memory of Large ROM but has a longer latency and a slight decrease in accuracy.</LI><LI>CORDIC uses no memory, but consumes more logic and has the lowest accuracy.</LI><LI>The Multiplier-based architecture uses smaller ROMs than Small ROM but uses extra logic and DSP blocks.</LI></UL>

WANT_SIN_AND_COS_DISPLAY = Outputs
WANT_SIN_AND_COS_SINGLE_OUTPUT = Single Output
WANT_SIN_AND_COS_DUAL_OUTPUT = Dual Output
WANT_SIN_AND_COS_DESCRIPTION = Controls whether to generate both a sine and a cosine wave or just a sine wave.
WANT_SIN_AND_COS_LONG_DESCRIPTION = + Generating just a single wave can save resources versus generating both waves.

NUMCH_DISPLAY = Number of Channels
NUMCH_DESCRIPTION = Number of Channels to simultaneously generate.
NUMCH_LONG_DESCRIPTION = Generating multiple channels allows the core to share resources and so is more efficient than generating multiple cores.

NUMBA_DISPLAY = Number of Bands
NUMBA_DESCRIPTION = Selecting more than one band enables frequency hopping.
NUMBA_LONG_DESCRIPTION = + This replaces the increment input with a selector input which chooses the band. Each band has its own increment, reprogrammable using an Avalon Memory-Mapped slave.

USE_DEDICATED_MULTIPLIERS_DISPLAY = Use dedicated multipliers
USE_DEDICATED_MULTIPLIERS_DESCRIPTION = When enabled the core implements multipliers using DSP blocks as opposed to logic.

SELECTED_DEVICE_FAMILY_DISPLAY = Device Family
SELECTED_DEVICE_FAMILY_DESCRIPTION = The NCO takes advantage of specific features of the device family.

APR_DISPLAY = Phase Accumulator Precision
APR_DESCRIPTION = Width of the Phase Accumulator.

APRI_DISPLAY = Angular Resolution
APRI_DESCRIPTION = Width of the input to the amplitude calculation.

MPR_DISPLAY = Magnitude Resolution
MPR_DESCRIPTION = Width of the output signals for each generated wave. 

CORDIC_ARCH_DISPLAY = CORDIC Architecture
CORDIC_ARCH_PARALLEL = Parallel
CORDIC_ARCH_SERIAL = Serial
CORDIC_ARCH_DESCRIPTION = Choose between a Serial or Parallel CORDIC architecture.
CORDIC_ARCH_LONG_DESCRIPTION = + The parallel CORDIC can generate a new output every cycle but is much larger than the serial CORDIC.

CYCLES_PER_OUTPUT_DISPLAY = Clock cycles per output
CYCLES_PER_OUTPUT_LONG_DESCRIPTION = For most architectures, this is fixed at 1. Serial CORDIC takes as many cycles as there are bits in the output.
TRIG_CYCLES_PER_OUTPUT_LONG_DESCRIPTION = With 2 cycles to calculate each output, the core can use half as many multipliers as when it has only 1 cycle for the calculation.

WANT_DITHER_DISPLAY = Implement Phase Dithering
WANT_DITHER_DESCRIPTION = Enable dithering to reduce the magnitude of spurs due to phase truncation.

DPRI_DISPLAY = Dither Level
DPRI_DESCRIPTION = Increasing the dithering level, increases the overall noise level but can provide significant improvement in spurious free dynamic range (SFDR).

FSAMP_DISPLAY = Clock Rate
FSAMP_DESCRIPTION = The clock frequency at which that the NCO will run.

FREQ_OUT_DISPLAY = Desired Output Frequency
FREQ_OUT_DESCRIPTION = The desired frequency that the NCO will produce.

PHI_INC_DISPLAY = Phase Increment Value
PHI_INC_DESCRIPTION = The increment value required to produce the desired frequency. 

REAL_FREQ_OUT_DISPLAY = Real Output Frequency
REAL_FREQ_OUT_DESCRIPTION = The frequency that will be produced given the above increment.
REAL_FREQ_OUT_LONG_DESCRIPTION = The frequency that will be produced given the above phase increment.

WANT_FREQ_MOD_DISPLAY = Frequency Modulation Input
WANT_FREQ_MOD_DESCRIPTION = Enable to add input ports that control frequency modulation.

APRF_DISPLAY = Modulator Resolution
APRF_DESCRIPTION = Width of the frequency modulation input.

FMOD_PIPE_DISPLAY = Modulator Pipeline Level
FMOD_PIPE_DESCRIPTION = Controls the level of pipelining for the frequency modulation input.

WANT_PHASE_MOD_DISPLAY = Phase Modulation Input
WANT_PHASE_MOD_DESCRIPTION = Enable to add input ports that control phase modulation

APRP_DISPLAY = Modulator Resolution
APRP_DESCRIPTION = Width of the phase modulation input

PMOD_PIPE_DISPLAY = Modulator Pipeline Level
PMOD_PIPE_DESCRIPTION = Controls the level of pipelining for the phase modulation input.

HYPER_OPT_SELECT_DISPLAY = Optimize for Stratix 10
HYPER_OPT_SELECT_DESCRIPTION = Enable the optimization for Stratix 10 (Can be evaluated on S10 early access model of Arria 10 family)

# Error messages
ERROR_APR_LESS_THAN_APRI = The phase accumulator precision ($apr) must be greater then the angular precision ($apri)
ERROR_APRI_TOO_LARGE_FOR_ARCH = Angular precision ($apri) is too large for this generation algorithm ($arch)
ERROR_APRF_GREATER_THAN_APR = Frequency modulation resolution ($aprf) must not be greater than the phase accumulator precision ($apr)
ERROR_APRP_GREATER_THAN_APR = Phase modulation precision ($aprp) must not be greater than the phase accumulator precision ($apr)
ERROR_APRP_LESS_THAN_APRI = Phase modulation precision ($aprp) must not be less than the angular precision ($apri)
ERROR_NUMCH_AND_NUMBA_BOTH_USED = Only one of number of channels ($numch) and number of bands ($numba) can be greater than 1
ERROR_CLOCK_RATE_ZERO_OR_LESS = The clock rate ($fsamp MHz) must be greater than 0
ERROR_OUT_RATE_ZERO_OR_LESS = The output frequency ($freq_out MHz) must be greater than 0
ERROR_FREQ_OUT_TOO_HIGH = The output frequency selected ($freq_out MHz) is too high. The maximum frequency possible with the current parameters is $max_freq MHz
ERROR_INCREMENT_TOO_SMALL = The output frequency selected ($freq_out MHz) is too low. The minimum output frequency is $min_freq MHz
ERROR_SERIAL_CORDIC_AND_MULTI_CHAN = The serial CORDIC architecture cannot be used when the number of channels ($numch) is greater than 1
ERROR_TIMESHARED_TRIG_AND_MULTI_CHAN = The multiplier-based architecture cannot be used when the number of channels ($numch) is greater than 1 and cycles per output ($mult_tput) is greater than 1

