MSG_COMPAT_IP_NO_UPGRADE = Upgrade not supported for %1 of version %2
# TYPE = W
# STATUS = C

MSG_COMPAT_IP_NO_UPGRADE_IGNORED_PARAM = Parameter "%1" no longer exists in the current IP version and is not set. It was set to "%2"
# TYPE = W
# STATUS = C

MSG_MIGRATING_INVALID_PARAM_VALUE = Parameter value "%1" is no longer valid in the current IP version. It should be migrated to "%2".
# TYPE = W
# STATUS = C

MSG_COMPAT_FROM_13_1_NEW_IO_SCHEME = The current IP version has significantly changed the way I/O settings are specified. Your previous I/O standard, input and output termination settings may have been overwritten during the upgrade. Please confirm the settings in the I/O tab.
# TYPE = W
# STATUS = C

MSG_COMPAT_HPS_JTAG_UART_NOT_SUPPORTED = JTAG UART (DIAG_ENABLE_JTAG_UART) is currently not supported for HPS EMIF cores.  For UART debug, please use the RS232 UART (DIAG_ENABLE_HPS_EMIF_DEBUG) instead.
# TYPE = W
# STATUS = C

MSG_COMPAT_PARAM_REPLACED_PARAMATER = Parameter "%1" has been replaced by "%2" in the current IP version. Please confirm that the value of the new parameter is correct.
# TYPE = W
# STATUS = C

MSG_COMPAT_PARAM_UPDATED_PARAMATER = Value of parameter "%1" has been updated from "%2" to "%3". Please confirm that the new value is correct.
# TYPE = W
# STATUS = C

MSG_DEVICE_NOT_SPECIFIED = No FPGA device is selected under 'View'->'Device Family'. Generation assumes a production device of the fastest device speedgrade and may skip device compatibility checks.
