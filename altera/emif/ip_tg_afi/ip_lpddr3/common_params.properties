PARAM_BOARD_DDR4_MAX_DQS_DELAY_NS_NAME = Maximum DQS delay to DIMM/device
PARAM_BOARD_DDR4_MAX_DQS_DELAY_NS_DESC = The delay of the longest DQS trace from the FPGA to any DIMM/device.
PARAM_BOARD_DDR4_MAX_DQS_DELAY_NS_STATUS = R

PARAM_BOARD_DDR4_SKEW_BETWEEN_DIMMS_NS_NAME = Maximum delay difference between DIMMs/devices
PARAM_BOARD_DDR4_SKEW_BETWEEN_DIMMS_NS_DESC = The largest propagation delay on DQ signals between ranks.	For example, in a two-rank configuration where you place DIMMs in different slots there is an extra propagation delay for DQ signals going to and coming back from the furthest DIMM compared to the nearest DIMM.  This parameter is only applicable when there is more than one rank.
