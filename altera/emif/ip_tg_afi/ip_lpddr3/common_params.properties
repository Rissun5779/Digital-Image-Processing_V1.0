PARAM_BOARD_QDR2_AC_TO_K_SKEW_NS_NAME = Average delay difference between address/command and K
PARAM_BOARD_QDR2_AC_TO_K_SKEW_NS_DESC = The average delay difference between the address and command signals and the K signal, calculated by averaging the longest and smallest Address/Command signal delay minus the K delay. Positive values represent address and command signals that are longer than K signals and negative values represent address and command signals that are shorter than K signals. The Quartus Prime software uses this skew to optimize the delay of the address and command signals to have appropriate setup and hold margins.
PARAM_BOARD_QDR2_AC_TO_K_SKEW_NS_STATUS = R

PARAM_BOARD_QDR2_SKEW_BETWEEN_DIMMS_NS_NAME = Maximum delay difference between devices
PARAM_BOARD_QDR2_SKEW_BETWEEN_DIMMS_NS_DESC = The largest propagation delay on DQ signals between ranks.	For example, in a two-rank configuration where you place devices in series there is an extra propagation delay for DQ signals going to and coming back from the furthest device compared to the nearest device.  This parameter is only applicable when there is more than one rank.
