# EMIF Parameter Descriptions
###############################################################################
# These descriptions are imported by both the EMIF handbook and EMIF Qsys GUI.
#
# *_STATUS fields are used by the handbook autogeneration infrastructure to
# add change bars to modified content. Any value other than "R" will result in
# a change bar appearing for that parameter in internal reviews.
# The recommended flow is to indicate changed content by setting the STATUS
# value to "C".
###############################################################################


# Parameter Groups
GROUP_GEN_NAME = General Parameters
GROUP_DIAG_NAME = Diagnostic Parameters
GROUP_EX_DESIGN_NAME = Example Design Parameters
GROUP_CTRL_NAME = Controller Parameters
GROUP_MEM_NAME = Memory Parameters
GROUP_BOARD_NAME = Board Parameters

###############################################################################
# Protocol-Agnostic Parameters
###############################################################################

PARAM_PROTOCOL_ENUM_NAME = Protocol
PARAM_PROTOCOL_ENUM_DESC = The protocol of the memory interface
PARAM_PROTOCOL_ENUM_STATUS = R

PARAM_SHORT_QSYS_INTERFACE_NAMES_NAME = Use short Qsys interface names
PARAM_SHORT_QSYS_INTERFACE_NAMES_DESC = If disabled, the names of the Qsys interfaces exposed by the IP include the type and direction of the interfaces. Short interface names generally result in better usability and consistency with other Qsys components. Long interface names are supported for backward-compatibility and will be removed in a future release.
PARAM_SHORT_QSYS_INTERFACE_NAMES_STATUS = R

PARAM_PHY_FPGA_SPEEDGRADE_GUI_NAME = Speed grade
PARAM_PHY_FPGA_SPEEDGRADE_GUI_DESC = Speed grade of FPGA device, and whether it is an engineering sample (ES) or a production device. The value is automatically determined based on the device selected under 'View'->'Device Family'. If a device is not specified, generation assumes a production device of the fastest speed grade. You should always specify the correct target device during IP generation. Failure to do so may result in a generated IP that does not work on hardware.
PARAM_PHY_FPGA_SPEEDGRADE_GUI_STATUS = R

PARAM_DIAG_SIM_CAL_MODE_ENUM_NAME = Calibration mode
PARAM_DIAG_SIM_CAL_MODE_ENUM_DESC = Specifies whether to skip memory interface calibration during simulation, or to simulate the full calibration process. Simulating the full calibration process can take a long time (i.e. hours, or even days, depending on the width and depth of the memory interface) and is not recommended. Skipping the calibration process results in much faster simulation time, but is only expected to work when the memory model is ideal and the interconnect delays are zero.
PARAM_DIAG_SIM_CAL_MODE_ENUM_STATUS = R

PARAM_DIAG_EXPORT_SEQ_AVALON_SLAVE_NAME = Quartus Prime EMIF Debug Toolkit/On-Chip Debug Port
PARAM_DIAG_EXPORT_SEQ_AVALON_SLAVE_DESC = Specifies the connectivity of an Avalon slave interface for use by the Quartus Prime EMIF Debug Toolkit or user core logic access to calibration data.  If "Disabled" is selected, no debug features are enabled.  If "Export" is selected, an Avalon slave interface named "cal_debug" is exported from the IP.  To use this interface with the Quartus Prime EMIF Debug Toolkit, it is necessary to instantiate and connect an EMIF Debug Interface IP core to it, or connect it to the cal_debug_out interface of another EMIF core.  If "Add EMIF Debug Interface" is selected, an EMIF Debug Interface component containing a JTAG Avalon Master is connected to the debug port.  This option allows the core to be accessed using the Quartus Prime EMIF Debug Toolkit.  Only one EMIF Debug Interface should be instantiated per I/O column.  Additional EMIF/PHYLite cores can be chained to the first by enabling the "Enable Daisy-Chaining for Quartus Prime EMIF Debug Toolkit/On-Chip Debug Port" option for all cores in the chain, and selecting "Export" for the "Quartus Prime EMIF Debug Toolkit/On-Chip Debug Port" option on all cores beyond the first.
PARAM_DIAG_EXPORT_SEQ_AVALON_SLAVE_STATUS = R

PARAM_DIAG_EXPORT_SEQ_AVALON_MASTER_NAME = Enable Daisy-Chaining for Quartus Prime EMIF Debug Toolkit/On-Chip Debug Port
PARAM_DIAG_EXPORT_SEQ_AVALON_MASTER_DESC = If enabled, exports an Avalon-MM Master interface (cal_debug_out) which can be used to connect to the cal_debug interface of other EMIF cores residing in the same I/O column.  This option only applies if the Quartus Prime EMIF Debug Toolkit/On-Chip Debug Port option is not set to "Disabled".
PARAM_DIAG_EXPORT_SEQ_AVALON_MASTER_STATUS = R

PARAM_DIAG_INTERFACE_ID_NAME = Interface ID
PARAM_DIAG_INTERFACE_ID_DESC = ID used to identify this interface within the I/O column.  This is used by the Quartus Prime EMIF Debug Toolkit and the On-Chip Debug Port.  Interface IDs should be unique among EMIF cores within the same I/O column.  If the Quartus Prime EMIF Debug Toolkit/On-Chip Debug Port is set to Disabled, the interface ID is unused.
PARAM_DIAG_INTERFACE_ID_STATUS = R

PARAM_DIAG_EFFICIENCY_MONITOR_NAME = Enable Efficiency Monitor
PARAM_DIAG_EFFICIENCY_MONITOR_DESC = Adds an Efficiency Monitor component to the Avalon-MM interface of the memory controller.  This component can be accessed by the Quartus Prime EMIF Debug Toolkit to view statistics on the efficiency of the interface.
PARAM_DIAG_EFFICIENCY_MONITOR_STATUS = R

PARAM_DIAG_EX_DESIGN_ADD_TEST_EMIFS_NAME = Add extra EMIFs to example design
PARAM_DIAG_EX_DESIGN_ADD_TEST_EMIFS_DESC = Specifies a string that configures additional memory interfaces in the example design. Designed for internal testing only.
PARAM_DIAG_EX_DESIGN_ADD_TEST_EMIFS_STATUS = R

PARAM_DIAG_SIM_REGTEST_MODE_NAME = Simulation regtest mode
PARAM_DIAG_SIM_REGTEST_MODE_DESC = Enable simulation regtest mode to exercise additional features.
PARAM_DIAG_SIM_REGTEST_MODE_STATUS = R

PARAM_DIAG_TIMING_REGTEST_MODE_NAME = Timing regtest mode
PARAM_DIAG_TIMING_REGTEST_MODE_DESC = Enable timing regtest mode to include non-EMIF paths in the DDR timing report.
PARAM_DIAG_TIMING_REGTEST_MODE_STATUS = R

PARAM_DIAG_SYNTH_FOR_SIM_NAME = Synthesize for simulation
PARAM_DIAG_SYNTH_FOR_SIM_DESC = Turn on this option so that the synthesized behavior of the EMIF matches that of RTL simulation. Intended to reduce runtime of netlist-level simulation.  This option should not be turned on when generating a SOF for programming the FPGA.
PARAM_DIAG_SYNTH_FOR_SIM_STATUS = R

PARAM_DIAG_VERBOSE_IOAUX_NAME = Show verbose IOAUX debug messages
PARAM_DIAG_VERBOSE_IOAUX_DESC = This option enables displaying debug messages detailing read and write transactions issued by the IOAUX on the sequencer bus.
PARAM_DIAG_VERBOSE_IOAUX_STATUS = R

PARAM_DIAG_FAST_SIM_OVERRIDE_NAME = Fast simulation override
PARAM_DIAG_FAST_SIM_OVERRIDE_DESC = Set this option to "enabled" or "disabled" to force enable/disable a faster simulation model for selected modules in the EMIF IP.  For skip-cal simulation, the fast model is enabled by default and should provide accurate simulations.  For full-cal simulations (or if users are manipulating delay settings on the fly) this model is not guaranteed to provide accurate results.
PARAM_DIAG_FAST_SIM_OVERRIDE_STATUS = R

PARAM_DIAG_EXPOSE_DFT_SIGNALS_NAME = Expose test and debug signals
PARAM_DIAG_EXPOSE_DFT_SIGNALS_DESC = If enabled, the top-level exposes signals intended for internal testing and debugging.
PARAM_DIAG_EXPOSE_DFT_SIGNALS_STATUS = R

PARAM_DIAG_ECLIPSE_DEBUG_NAME = Enable Eclipse debugging
PARAM_DIAG_ECLIPSE_DEBUG_DESC = Enables debugging the calibration software using Eclipse.
PARAM_DIAG_ECLIPSE_DEBUG_STATUS = R

PARAM_DIAG_EXPORT_VJI_NAME = Export Virtual JTAG Interface (VJI)
PARAM_DIAG_EXPORT_VJI_DESC = Export the Virtual JTAG Interface (VJI) ports used for connecting to the OCI debug module of the IOAUX.  Exporting this interface alone will not enable debugging via Eclipse.
PARAM_DIAG_EXPORT_VJI_STATUS = R

PARAM_DIAG_ENABLE_JTAG_UART_NAME = Enable JTAG UART
PARAM_DIAG_ENABLE_JTAG_UART_DESC = Enable JTAG UART to print calibration debug messages.
PARAM_DIAG_ENABLE_JTAG_UART_STATUS = R

PARAM_DIAG_ENABLE_JTAG_UART_HEX_NAME = Enable JTAG UART hexfiles
PARAM_DIAG_ENABLE_JTAG_UART_HEX_DESC = Selects the calibration code hexfiles with JTAG UART debug messages enabled.
PARAM_DIAG_ENABLE_JTAG_UART_HEX_STATUS = R

PARAM_DIAG_ENABLE_HPS_EMIF_DEBUG_NAME = Enable UART for HPS EMIF Debug
PARAM_DIAG_ENABLE_HPS_EMIF_DEBUG_DESC = Enable UART for HPS EMIF Debug to print calibration debug messages.
PARAM_DIAG_ENABLE_HPS_EMIF_DEBUG_STATUS = R

PARAM_DIAG_SOFT_NIOS_MODE_NAME = Use Soft NIOS Processor for On-Chip Debug
PARAM_DIAG_SOFT_NIOS_MODE_DESC = Enables the use of a soft Nios processor as a peripheral component to access the On-Chip Debug Port.  Only one interface in a column can activate this option.
PARAM_DIAG_SOFT_NIOS_MODE_STATUS = R

PARAM_DIAG_SOFT_NIOS_CLOCK_FREQUENCY_NAME = Calibration Processor External Clock Frequency
PARAM_DIAG_SOFT_NIOS_CLOCK_FREQUENCY_DESC = Specifies the frequency of the externally-supplied clock input for the soft calibration processor
PARAM_DIAG_SOFT_NIOS_CLOCK_FREQUENCY_STATUS = R

PARAM_DIAG_USE_JTAG_UART_NAME = Use a JTAG UART for Soft NIOS Calibration Processor debug output (requires code change)
PARAM_DIAG_USE_JTAG_UART_DESC = If enabled, a JTAG UART interface will be created as part of the soft NIOS calibration debug module
PARAM_DIAG_USE_JTAG_UART_STATUS = R

PARAM_DIAG_USE_RS232_UART_NAME = Use an RS232 UART for Soft NIOS Calibration Processor debug output (requires code change)
PARAM_DIAG_USE_RS232_UART_DESC = If enabled, an RS232 UART interface will be created as part of the soft NIOS calibration debug module
PARAM_DIAG_USE_RS232_UART_STATUS = R

PARAM_DIAG_RS232_UART_BAUDRATE_NAME = RS232 UART Speed
PARAM_DIAG_RS232_UART_BAUDRATE_DESC = Sets the speed in bits per second of the soft UART
PARAM_DIAG_RS232_UART_BAUDRATE_STATUS = R

PARAM_DIAG_EXTRA_CONFIGS_NAME = Extra configuration
PARAM_DIAG_EXTRA_CONFIGS_DESC = Specifies a string that provides additional configuration for internal testing and debugging.
PARAM_DIAG_EXTRA_CONFIGS_STATUS = R

PARAM_DIAG_USE_BOARD_DELAY_MODEL_NAME = Use board delay model during simulation
PARAM_DIAG_USE_BOARD_DELAY_MODEL_DESC = Use board delay model during simulation to test calibration algorithm
PARAM_DIAG_USE_BOARD_DELAY_MODEL_STATUS = R

PARAM_DIAG_BOARD_DELAY_CONFIG_STR_NAME = Board delay model configuration
PARAM_DIAG_BOARD_DELAY_CONFIG_STR_DESC = String of comma-separated key-value pairs (key1=value1,key2=value2...). The key names are in altera_emif_board_delay_model.sv. They may be indexed or not (e.g. "mem_ck_dly(0)" or "mem_ck_dly" which applies to all ck).  Values can be in terms of ps or ck (e.g. "50ps" or "1ck").
PARAM_DIAG_BOARD_DELAY_CONFIG_STR_STATUS = R

PARAM_DIAG_DDR3_CA_LEVEL_EN_NAME = Enable address/command leveling calibration (experimental)
PARAM_DIAG_DDR3_CA_LEVEL_EN_DESC = Enable the address/command leveling calibration stage. Address/command leveling attempts to center the memory clock edge against CS# by adjusting delay elements inside the PHY, and then apply the same delay offset to the rest of address/command pins.  This may be used to confirm a potential timing issue on the address/command bus.
PARAM_DIAG_DDR3_CA_LEVEL_EN_STATUS = R

PARAM_DIAG_DDR4_SKIP_CA_LEVEL_NAME = Skip address/command leveling calibration
PARAM_DIAG_DDR4_SKIP_CA_LEVEL_DESC = Skip the address/command leveling calibration stage. Address/command leveling attempts to center the memory clock edge against CS# by adjusting delay elements inside the PHY, and then apply the same delay offset to the rest of address/command pins.
PARAM_DIAG_DDR4_SKIP_CA_LEVEL_STATUS = R

PARAM_DIAG_DDR4_SKIP_CA_DESKEW_NAME = Skip address/command deskew calibration
PARAM_DIAG_DDR4_SKIP_CA_DESKEW_DESC = Skip the address/command deskew calibration stage. Address/command deskew performs per-bit deskew for the address/command pins.
PARAM_DIAG_DDR4_SKIP_CA_DESKEW_STATUS = R

PARAM_DIAG_DDR4_SKIP_VREF_CAL_NAME = Skip VREF calibration
PARAM_DIAG_DDR4_SKIP_VREF_CAL_DESC = Skip the VREF calibration stage.
PARAM_DIAG_DDR4_SKIP_VREF_CAL_STATUS = R


PARAM_DIAG_DDR3_CAL_ADDR0_NAME = Calibration address 0
PARAM_DIAG_DDR3_CAL_ADDR0_DESC = Address 0 used during non-desctructive calibration.  The calibration addresses used are BA/R/C:  0/address_0/address_0,  0/address_0/address_1, 3/address_0/address_0,  3/address_0/address_1
PARAM_DIAG_DDR3_CAL_ADDR0_STATUS = R

PARAM_DIAG_DDR3_CAL_ADDR1_NAME = Calibration address 1
PARAM_DIAG_DDR3_CAL_ADDR1_DESC = Address 1 used during non-desctructive calibration.  The calibration addresses used are BA/R/C:  0/address_0/address_0,  0/address_0/address_1, 3/address_0/address_0,  3/address_0/address_1
PARAM_DIAG_DDR3_CAL_ADDR1_STATUS = R

PARAM_DIAG_DDR3_CAL_ENABLE_NON_DES_NAME = Enable refreshes during calibration
PARAM_DIAG_DDR3_CAL_ENABLE_NON_DES_DESC = Enable refreshes during calibration
PARAM_DIAG_DDR3_CAL_ENABLE_NON_DES_STATUS = R

PARAM_DIAG_DDR3_CAL_FULL_CAL_ON_RESET_NAME = Enable automatic calibration after reset
PARAM_DIAG_DDR3_CAL_FULL_CAL_ON_RESET_DESC = When disabled, calibration will wait for user logic initiated calibration request before proceeding.  This behaviour should be disabled when non-destructive calibration is desired.
PARAM_DIAG_DDR3_CAL_FULL_CAL_ON_RESET_STATUS = R

PARAM_DIAG_DDR4_CAL_ADDR0_NAME = Calibration address 0
PARAM_DIAG_DDR4_CAL_ADDR0_DESC = Address 0 used during non-desctructive calibration.  The calibration addresses used are BA/R/C:  0/address_0/address_0,  0/address_0/address_1, 3/address_0/address_0,  3/address_0/address_1
PARAM_DIAG_DDR4_CAL_ADDR0_STATUS = R

PARAM_DIAG_DDR4_CAL_ADDR1_NAME = Calibration address 1
PARAM_DIAG_DDR4_CAL_ADDR1_DESC = Address 1 used during non-desctructive calibration.  The calibration addresses used are BA/R/C:  0/address_0/address_0,  0/address_0/address_1, 3/address_0/address_0,  3/address_0/address_1
PARAM_DIAG_DDR4_CAL_ADDR1_STATUS = R

PARAM_DIAG_DDR4_CAL_ENABLE_NON_DES_NAME = Enable refreshes during calibration
PARAM_DIAG_DDR4_CAL_ENABLE_NON_DES_DESC = Enable refreshes during calibration
PARAM_DIAG_DDR4_CAL_ENABLE_NON_DES_STATUS = R

PARAM_DIAG_DDR4_CAL_FULL_CAL_ON_RESET_NAME = Enable automatic calibration after reset
PARAM_DIAG_DDR4_CAL_FULL_CAL_ON_RESET_DESC = When disabled, calibration will wait for user logic initiated calibration request before proceeding.  This behaviour should be disabled when non-destructive calibration is desired.
PARAM_DIAG_DDR4_CAL_FULL_CAL_ON_RESET_STATUS = R

PARAM_PHY_CORE_CLKS_SHARING_ENUM_NAME = Core clocks sharing
PARAM_PHY_CORE_CLKS_SHARING_ENUM_DESC = When a design contains multiple interfaces of the same protocol, rate, frequency, and PLL reference clock source, it is possible to share a common set of core clock domains, to reduce clock network usage and to avoid clock synchronization logic between interfaces. To achieve this, denote one of the interfaces as "Master", and the remaining interfaces as "Slave".  Then, in the RTL, connect the clks_sharing_master_out signal from the master interface to the clks_sharing_slave_in signal of all the slave interfaces. Both master and slave interfaces still expose their own output clock ports in the RTL (e.g. emif_usr_clk, afi_clk), but the physical signals are equivalent and so it does not matter whether a clock port from a master or a slave is used.  Note that as the combined width of all interfaces sharing the same core clock increases, you may encounter timing closure difficulty for transfers between the FPGA core and the periphery.
PARAM_PHY_CORE_CLKS_SHARING_ENUM_STATUS = R

PARAM_PHY_USER_PERIODIC_OCT_RECAL_ENUM_NAME = Periodic OCT re-calibration
PARAM_PHY_USER_PERIODIC_OCT_RECAL_ENUM_DESC = Periodically perform on-chip termination (OCT) re-calibration to minimize variation of termination resistance caused by a change of operating condition (e.g. temperature), thereby improving I/O timing margins. If enabled, the PHY halts user traffic periodically (approximately every 0.5 second) to perform OCT re-calibration. If disabled, or if the feature is not supported, OCT calibration is performed once during device power-up.
PARAM_PHY_USER_PERIODIC_OCT_RECAL_ENUM_STATUS = R

PARAM_PHY_HPS_ENABLE_EARLY_RELEASE_NAME = Enable HPS Early Release Mode
PARAM_PHY_HPS_ENABLE_EARLY_RELEASE_DESC = Enable HPS Early Release Mode.  This option must be set for HPS External Memory Interfaces that use the peripheral-only boot mode (split RBF loading), otherwise the memory interface will cease to function once the core image is programmed.
PARAM_PHY_HPS_ENABLE_EARLY_RELEASE_STATUS = R

PARAM_PHY_PERIODIC_OCT_RECAL_NAME = Enable Periodic OCT Recalibration
PARAM_PHY_PERIODIC_OCT_RECAL_DESC = Enable Periodic OCT Recalibration.  This option periodically re-calibrates the termination settings for I/O pins on the FPGA and memory device.  This option should be enabled to improve I/O timing margin, however, it can only be enabled if the Hard Memory Controller is in use and the EMIF uses a dedicated RZQ resistor that is not shared with other interfaces. Consult the EMIF handbook for additional design considerations and efficiency impact.
PARAM_PHY_PERIODIC_OCT_RECAL_STATUS = R

PARAM_DIAG_EX_DESIGN_NUM_OF_SLAVES_NAME = Number of core clocks sharing slaves to instantiate in the example design
PARAM_DIAG_EX_DESIGN_NUM_OF_SLAVES_DESC = Number of core clock sharing slaves to instantiate in the example design. Applies only if the "Core clocks sharing" parameter in the "General" tab is set to Master or Slave.
PARAM_DIAG_EX_DESIGN_NUM_OF_SLAVES_STATUS = R

PARAM_DIAG_EX_DESIGN_SEPARATE_RZQS_NAME = Use a separate RZQ resistor for every sharing interface
PARAM_DIAG_EX_DESIGN_SEPARATE_RZQS_DESC = Use a separate RZQ resistor for every sharing interface.  Applies only if the "Core clocks sharing" parameter in the "General" tab is set to Master or Slave.  If unchecked, the RZQ resistor for the master interface will be used to calibrate OCT settings for all slave interfaces.
PARAM_DIAG_EX_DESIGN_SEPARATE_RZQS_STATUS = R

PARAM_DIAG_EX_DESIGN_ISSP_EN_NAME = Enable In-System-Sources-and-Probes
PARAM_DIAG_EX_DESIGN_ISSP_EN_DESC = Enable In-System-Sources-and-Probes of common debug signals, such as calibration status, example traffic generator per-bit statis, in the example design.
PARAM_DIAG_EX_DESIGN_ISSP_EN_STATUS = R

PARAM_DIAG_EX_DESIGN_SEPARATE_RESETS_NAME = Use a separate global reset signal for every interface
PARAM_DIAG_EX_DESIGN_SEPARATE_RESETS_DESC = Use a separate global reset signal for every interface in the example design
PARAM_DIAG_EX_DESIGN_SEPARATE_RESETS_STATUS = R

PARAM_DIAG_USE_TG_AVL_2_NAME = Use configurable Avalon traffic generator 2.0
PARAM_DIAG_USE_TG_AVL_2_DESC = Use the new configurable Avalon traffic generator in the example design
PARAM_DIAG_USE_TG_AVL_2_STATUS = R

PARAM_DIAG_ABSTRACT_PHY_NAME = Abstract phy for fast simulation
PARAM_DIAG_ABSTRACT_PHY_DESC = Used to replace phy with model for fast simulation
PARAM_DIAG_ABSTRACT_PHY_STATUS = R

PARAM_DIAG_TG_DATA_PATTERN_LENGTH_NAME = Data Pattern Length
PARAM_DIAG_TG_DATA_PATTERN_LENGTH_DESC = The length of the deterministic data pattern, or the n+1 PRBS coefficient, ie a value of 8 for PRBS-7
PARAM_DIAG_TG_DATA_PATTERN_LENGTH_STATUS = R

PARAM_DIAG_TG_BE_PATTERN_LENGTH_NAME = Byte Enable Pattern Length
PARAM_DIAG_TG_BE_PATTERN_LENGTH_DESC = The length of the deterministic byte enable pattern, or the n+1 PRBS coefficient, ie a value of 8 for PRBS-7
PARAM_DIAG_TG_BE_PATTERN_LENGTH_STATUS = R

PARAM_DIAG_BYPASS_DEFAULT_PATTERN_NAME = Bypass the default traffic pattern
PARAM_DIAG_BYPASS_DEFAULT_PATTERN_DESC = If checked, bypasses the traffic generator 2.0 default pattern after reset.
PARAM_DIAG_BYPASS_DEFAULT_PATTERN_STATUS = R

PARAM_DIAG_BYPASS_USER_STAGE_NAME = Bypass the user-configured traffic stage
PARAM_DIAG_BYPASS_USER_STAGE_DESC = If checked, bypasses the user-configured traffic generator 2.0 pattern after reset.  (The traffic generator can still be reconfigured later.)  If unchecked, the traffic generator will not assert a pass or fail status until the generator is configured and signaled to start via its Avalon configuration interface.  Configuration can be done by connecting to the traffic generator via the EMIF Debug Toolkit, or by using custom logic connected to the Avalon-MM configuration slave port on the traffic generator.  Configuration can also be simulated using the example testbench provided in the altera_emif_avl_tg_2_tb.sv file.
PARAM_DIAG_BYPASS_USER_STAGE_STATUS = R

PARAM_DIAG_BYPASS_REPEAT_STAGE_NAME = Bypass the traffic generator repeated-writes/repeated-reads test pattern
PARAM_DIAG_BYPASS_REPEAT_STAGE_DESC = If checked, bypasses the traffic generator's repeats test stage. Every write and read will be repeated several times.
PARAM_DIAG_BYPASS_REPEAT_STAGE_STATUS = R

PARAM_DIAG_BYPASS_STRESS_STAGE_NAME = Bypass the traffic generator stress pattern
PARAM_DIAG_BYPASS_STRESS_STAGE_DESC = If checked, bypasses the traffic generator's stress pattern stage.  These are patterns that are meant to create worst-case signal integrity patterns on the data pins.
PARAM_DIAG_BYPASS_STRESS_STAGE_STATUS = R

PARAM_DIAG_TG_AVL_2_NUM_CFG_INTERFACES_NAME = Number of Traffic Generator 2.0 configuration interfaces
PARAM_DIAG_TG_AVL_2_NUM_CFG_INTERFACES_DESC = Number of Avalon-MM slave ports to instantiate for configuring the Traffic Generator.  This is only required if configuring the traffic generator using user logic.
PARAM_DIAG_TG_AVL_2_NUM_CFG_INTERFACES_STATUS = R

PARAM_DIAG_TG_AVL_2_EXPORT_CFG_INTERFACE_NAME = Export Traffic Generator 2.0 configuration interface
PARAM_DIAG_TG_AVL_2_EXPORT_CFG_INTERFACE_DESC = If checked, exports an Avalon-MM slave port for configuring the Traffic Generator.  This is only required if configuring the traffic generator using user logic.
PARAM_DIAG_TG_AVL_2_EXPORT_CFG_INTERFACE_STATUS = R

PARAM_PHY_DEFAULT_REF_CLK_FREQ_NAME = Use recommended PLL reference clock frequency
PARAM_PHY_DEFAULT_REF_CLK_FREQ_DESC = When checked, the PLL reference clock frequency is automatically calculated for best performance. Uncheck the check box if you want to specify your own PLL reference clock frequency.
PARAM_PHY_DEFAULT_REF_CLK_FREQ_STATUS = R

PARAM_PHY_USER_REF_CLK_FREQ_MHZ_NAME = PLL reference clock frequency
PARAM_PHY_USER_REF_CLK_FREQ_MHZ_DESC = PLL reference clock frequency. You must select a valid PLL reference clock frequency from the list. The values in the list can change if you change the memory interface frequency and/or the clock rate of user logic. It is recommended to use the fastest possible PLL reference clock frequency because it leads to better jitter performance.
PARAM_PHY_USER_REF_CLK_FREQ_MHZ_STATUS = R

PARAM_PHY_REF_CLK_FREQ_MHZ_NAME = PLL reference clock frequency
PARAM_PHY_REF_CLK_FREQ_MHZ_DESC = PLL reference clock frequency. You must feed a clock of this frequency to the PLL reference clock input of the memory interface.
PARAM_PHY_REF_CLK_FREQ_MHZ_STATUS = R

PARAM_PHY_REF_CLK_JITTER_PS_NAME = PLL reference clock jitter
PARAM_PHY_REF_CLK_JITTER_PS_DESC = PLL reference clock jitter. The peak-to-peak jitter on the reference clock source.
PARAM_PHY_REF_CLK_JITTER_PS_STATUS = R

PARAM_PHY_PING_PONG_EN_NAME = Instantiate two controllers sharing a Ping Pong PHY
PARAM_PHY_PING_PONG_EN_DESC = Select this option to instantiate two identically-configured memory controllers that share the same address/command bus through time multiplexing (i.e. Ping Pong PHY topology).  Ping Pong PHY results in an interface with fewer pins, compared to having two independent interfaces.  When this option is enabled, the IP core exposes two independent Avalon interfaces to user logic, and a single external memory interface with double the width for the data bus and the CS#, CKE, ODT, and CK/CK# signals.
PARAM_PHY_PING_PONG_EN_STATUS = R

PARAM_PHY_CONFIG_ENUM_NAME = Configuration
PARAM_PHY_CONFIG_ENUM_DESC = Specifies the configuration of the memory interface
PARAM_PHY_CONFIG_ENUM_STATUS = R

PARAM_PHY_MEM_CLK_FREQ_MHZ_NAME = Memory clock frequency
PARAM_PHY_MEM_CLK_FREQ_MHZ_DESC = Frequency of memory clock in MHz. Changing the memory frequency typically requires an update to memory latency parameters (inside the "Memory Topology" tab) and memory timing parameters (inside the "Memory Timing" tab).
PARAM_PHY_MEM_CLK_FREQ_MHZ_STATUS = R

PARAM_PHY_RATE_ENUM_NAME = Clock rate of user logic
PARAM_PHY_RATE_ENUM_DESC = Determines the clock frequency of user logic in relation to the memory clock frequency. For example, if the memory clock sent from the FPGA to the memory device is toggling at 800MHz, a "Quarter rate" interface means that the user logic in the FPGA runs at 200MHz.
PARAM_PHY_RATE_ENUM_STATUS = R

PARAM_PHY_IO_VOLTAGE_NAME = Voltage
PARAM_PHY_IO_VOLTAGE_DESC = I/O voltage of the signaling between memory device and memory interface
PARAM_PHY_IO_VOLTAGE_STATUS = R

PARAM_PHY_DEFAULT_IO_NAME = Use default I/O settings
PARAM_PHY_DEFAULT_IO_DESC = When checked, a legal set of I/O settings are automatically selected. Note that the default I/O settings are not necessarily optimized for your board. To achieve optimal signal integrity, perform I/O simulation and manually enter the I/O settings based on simulation results, instead of using the defaults.
PARAM_PHY_DEFAULT_IO_STATUS = R

PARAM_PHY_AC_IO_STD_ENUM_NAME = I/O standard
PARAM_PHY_AC_IO_STD_ENUM_DESC = I/O standard for the address/command pins of the memory interface.
PARAM_PHY_AC_IO_STD_ENUM_STATUS = R

PARAM_PHY_AC_MODE_ENUM_NAME = Output mode
PARAM_PHY_AC_MODE_ENUM_DESC = Output termination or current strength of the address/command output pins.
PARAM_PHY_AC_MODE_ENUM_STATUS = R

PARAM_PHY_AC_SLEW_RATE_ENUM_NAME = Slew rate
PARAM_PHY_AC_SLEW_RATE_ENUM_DESC = Slew rate of the address/command output pins.
PARAM_PHY_AC_SLEW_RATE_ENUM_STATUS = R

PARAM_PHY_CK_IO_STD_ENUM_NAME = I/O standard
PARAM_PHY_CK_IO_STD_ENUM_DESC = I/O standard for the memory clock pins of the memory interface.
PARAM_PHY_CK_IO_STD_ENUM_STATUS = R

PARAM_PHY_CK_MODE_ENUM_NAME = Output mode
PARAM_PHY_CK_MODE_ENUM_DESC = Output termination or current strength of the memory clock output pins.
PARAM_PHY_CK_MODE_ENUM_STATUS = R

PARAM_PHY_CK_SLEW_RATE_ENUM_NAME = Slew rate
PARAM_PHY_CK_SLEW_RATE_ENUM_DESC = Slew rate of the memory clock output pins.
PARAM_PHY_CK_SLEW_RATE_ENUM_STATUS = R

PARAM_PHY_DATA_IO_STD_ENUM_NAME = I/O standard
PARAM_PHY_DATA_IO_STD_ENUM_DESC = I/O standard for the data and data clock/strobe pins of the memory interface.
PARAM_PHY_DATA_IO_STD_ENUM_STATUS = R

PARAM_PHY_DATA_OUT_MODE_ENUM_NAME = Output mode
PARAM_PHY_DATA_OUT_MODE_ENUM_DESC = Output termination or current strength of the data and data clock/strobe pins.
PARAM_PHY_DATA_OUT_MODE_ENUM_STATUS = R

PARAM_PHY_DATA_IN_MODE_ENUM_NAME = Input mode
PARAM_PHY_DATA_IN_MODE_ENUM_DESC = Input termination of the data and data clock/strobe pins.
PARAM_PHY_DATA_IN_MODE_ENUM_STATUS = R

PARAM_PHY_AUTO_STARTING_VREFIN_EN_NAME = Use recommended initial Vrefin
PARAM_PHY_AUTO_STARTING_VREFIN_EN_DESC = If selected, the initial Vrefin setting is automatically calculated to a reasonable value based on termination settings.
PARAM_PHY_AUTO_STARTING_VREFIN_EN_STATUS = R

PARAM_PHY_STARTING_VREFIN_NAME = Initial Vrefin
PARAM_PHY_STARTING_VREFIN_DESC = Initial value for Vrefin (reference voltage on data pins).  This value is only used as a starting point and may be overridden by calibration.
PARAM_PHY_STARTING_VREFIN_STATUS = R

PARAM_PHY_PLL_REF_CLK_IO_STD_ENUM_NAME = PLL reference clock I/O standard
PARAM_PHY_PLL_REF_CLK_IO_STD_ENUM_DESC = I/O standard for the PLL reference clock of the memory interface.
PARAM_PHY_PLL_REF_CLK_IO_STD_ENUM_STATUS = R

PARAM_PHY_RZQ_IO_STD_ENUM_NAME = RZQ I/O standard
PARAM_PHY_RZQ_IO_STD_ENUM_DESC = I/O standard for the RZQ pin of the memory interface.
PARAM_PHY_RZQ_IO_STD_ENUM_STATUS = R

PARAM_PHY_RZQ_NAME = RZQ resistor
PARAM_PHY_RZQ_DESC = Connect the RZQ pin to GND through an external resistor of the specified value. The resistor is used by OCT calibration.
PARAM_PHY_RZQ_STATUS = R

PARAM_PLL_ADD_EXTRA_CLKS_NAME = Specify additional core clocks based on existing PLL
PARAM_PLL_ADD_EXTRA_CLKS_DESC = Use PLL counters that are unused by the memory interface PLL to generate additional core clock signals.  The option intends to provide a clock generation mechanism as your design runs out of PLL resources.  Clock signals generated by this option must be treated as asynchronous to the memory interface core clock domains (e.g. emif_usr_clk or afi_clk). Proper clock-domain-crossing techniques (e.g. asynchronous FIFO) must be employed when transferring data between them.  The additional core clocks are synchronous to each other.
PARAM_PLL_ADD_EXTRA_CLKS_STATUS = R

PARAM_PLL_USER_NUM_OF_EXTRA_CLKS_NAME = Number of additional core clocks
PARAM_PLL_USER_NUM_OF_EXTRA_CLKS_DESC = Specify the number of additional core clocks to generate
PARAM_PLL_USER_NUM_OF_EXTRA_CLKS_STATUS = R

PARAM_EX_DESIGN_SEL_DESIGN_NAME = Select design
PARAM_EX_DESIGN_SEL_DESIGN_DESC = Creates a Quartus Prime project that instantiates an external memory interface and an example traffic generator, according to the configuration that you specified in the parameter editor. After the design is created, you can optionally specify the target device and pin location assignments, run a full compilation using the Quartus Prime software, verify timing closure, and test the interface on your board using the programming file generated by the Quartus Prime assembler. Using the 'Generate Example Design' button, you can generate simulation or synthesis filesets.
PARAM_EX_DESIGN_SEL_DESIGN_STATUS = R

PARAM_EX_DESIGN_GEN_SIM_NAME = Simulation
PARAM_EX_DESIGN_GEN_SIM_DESC = When the Simulation box is checked, all necessary filesets required for simulation will be generated when 'Generate Example Design' is clicked. Expect an additional 1-2 minute delay when generating the simulation fileset.<br><br>When this box is NOT checked, filesets required for simulation will NOT be generated. Instead, the output directory will contain the ed_sim.qsys file which holds Qsys details of the simulation example design, and a make_sim_design.tcl script with other corresponding tcl files. The make_sim_design.tcl can be run from command line to generate the simulation example design.<br><br>The generated example designs for various simulators are stored under the /sim sub-directory.
PARAM_EX_DESIGN_GEN_SIM_STATUS = R

PARAM_EX_DESIGN_GEN_SYNTH_NAME = Synthesis
PARAM_EX_DESIGN_GEN_SYNTH_DESC = When the Synthesis box is checked, all necessary filesets required for synthesis will be generated when 'Generate Example Design' is clicked. Expect an additional 1-2 minute delay when generating the synthesis fileset.<br><br>When this box is NOT checked, filesets required for synthesis will NOT be generated. Instead, the output directory will contain the ed_synth.qsys file which holds Qsys details of the synthesis example design, and a make_qii_design.tcl script with other corresponding tcl files. The make_qii_design.tcl can be run from command line to generate the synthesis example design.<br><br>The generated example design is stored under the /qii sub-directory.
PARAM_EX_DESIGN_GEN_SYNTH_STATUS = R

PARAM_EX_DESIGN_HDL_FORMAT_NAME = Simulation HDL format
PARAM_EX_DESIGN_HDL_FORMAT_DESC = Format of HDL files generated for simulating the example design.
PARAM_EX_DESIGN_HDL_FORMAT_STATUS = R

PARAM_EX_DESIGN_TARGET_DEV_KIT_NAME = Select board
PARAM_EX_DESIGN_TARGET_DEV_KIT_DESC = When a development kit with a memory module is selected, the generated example design will contain all settings (including fixed pin assignments) to run on the selected board. Any IP settings not applied directly from a development kit preset will not have guaranteed results when testing the development kit. A development kit preset must be selected to generate a working example design for the respective development kit. You may apply a development kit-specific IP and related parameter settings by selecting one of the presets below.<br><br>To exclude hardware support of the example design, select 'none' from the 'Select board' pull down menu.<br><br><i>When you apply a development kit preset, all IP parameters are automatically set appropriately to match the selected preset. If you want to save your current settings, you should do so before you apply the preset. You can always save your settings under a different name using File->Save as.</i>
PARAM_EX_DESIGN_TARGET_DEV_KIT_STATUS = R

################################################################################
# DDRx
###############################################################################
PARAM_CTRL_DDRX_USER_PRIORITY_EN_NAME = Enable Command Priority Control
PARAM_CTRL_DDRX_USER_PRIORITY_EN_DESC = Select this option to enable the user-requested command priority control on the controller top level. The control signal allows you to indicate whether a read or write request should be treated as high priority by the controller.  The controller attempts to issue high priority commands sooner, to reduce latency.
PARAM_CTRL_DDRX_USER_PRIORITY_EN_STATUS = R

PARAM_CTRL_DDRX_SELF_REFRESH_EN_NAME = Enable Self-Refresh Control
PARAM_CTRL_DDRX_SELF_REFRESH_EN_DESC = Select this option to enable the self-refresh control on the controller top level. The control signal allows you to place the memory device into self-refresh mode, on a per chip-select basis.
PARAM_CTRL_DDRX_SELF_REFRESH_EN_STATUS = R

PARAM_CTRL_DDRX_AUTO_POWER_DOWN_EN_NAME = Enable Auto Power-Down
PARAM_CTRL_DDRX_AUTO_POWER_DOWN_EN_DESC = Select this option to allow the controller to automatically place the memory device into power-down mode after a specified number of controller clock cycles.
PARAM_CTRL_DDRX_AUTO_POWER_DOWN_EN_STATUS = R

PARAM_CTRL_DDRX_AUTO_POWER_DOWN_CYCS_NAME = Auto Power-Down Cycles
PARAM_CTRL_DDRX_AUTO_POWER_DOWN_CYCS_DESC = The number of idle controller (not DRAM) cycles after which the memory device is placed into power-down mode.
PARAM_CTRL_DDRX_AUTO_POWER_DOWN_CYCS_STATUS = R

PARAM_CTRL_DDRX_AUTO_PRECHARGE_EN_NAME = Enable Auto-Precharge Control
PARAM_CTRL_DDRX_AUTO_PRECHARGE_EN_DESC = Select this option to enable the auto-precharge control on the controller top level. Asserting the auto-precharge control signal while requesting a read or write burst allows you to specify whether or not the controller should close (auto-precharge) the currently open page at the end of the read or write burst, potentially speeding up a future access to a different page of the same bank.
PARAM_CTRL_DDRX_AUTO_PRECHARGE_EN_STATUS = R

PARAM_CTRL_DDRX_USER_REFRESH_EN_NAME = Enable User Refresh Control
PARAM_CTRL_DDRX_USER_REFRESH_EN_DESC = When enabled, user logic has complete control and is responsible for issuing adaquate refresh commands to the memory devices, via the MMR interface. This feature provides increased control over worst-case read latency and enables you to issue refresh bursts during idle periods.
PARAM_CTRL_DDRX_USER_REFRESH_EN_STATUS = R

PARAM_CTRL_DDRX_AVL_PROTOCOL_ENUM_NAME = Avalon Interface
PARAM_CTRL_DDRX_AVL_PROTOCOL_ENUM_DESC = Selects the Avalon Interface through which the controller interacts with user logic
PARAM_CTRL_DDRX_AVL_PROTOCOL_ENUM_STATUS = R

PARAM_CTRL_DDRX_ADDR_ORDER_ENUM_NAME = Address Ordering
PARAM_CTRL_DDRX_ADDR_ORDER_ENUM_DESC = Controls the mapping between the Avalon addresses and the memory device addresses
PARAM_CTRL_DDRX_ADDR_ORDER_ENUM_STATUS = R

PARAM_CTRL_DDRX_ECC_EN_NAME = Enable Error Detection and Correction Logic with ECC
PARAM_CTRL_DDRX_ECC_EN_DESC = Select this option to enable Error Correction Code (ECC) for single-bit error correction and double-bit error detection.  Your memory interface must be a multiple of 16, 24, 40 or 72 bits wide in order to be able to use ECC.
PARAM_CTRL_DDRX_ECC_EN_STATUS = R

PARAM_CTRL_DDRX_ECC_AUTO_CORRECTION_EN_NAME = Enable Auto Error Correction
PARAM_CTRL_DDRX_ECC_AUTO_CORRECTION_EN_DESC = Select this option to allow the controller to perform auto correction when a single-bit error has been detected by the ECC logic.
PARAM_CTRL_DDRX_ECC_AUTO_CORRECTION_EN_STATUS = R

PARAM_CTRL_DDRX_STARVE_LIMIT_NAME = Starvation limit for each command
PARAM_CTRL_DDRX_STARVE_LIMIT_DESC = Specifies the number of commands that can be served before a starved command is starved.
PARAM_CTRL_DDRX_STARVE_LIMIT_STATUS = R

PARAM_CTRL_DDRX_REORDER_EN_NAME = Enable Reordering
PARAM_CTRL_DDRX_REORDER_EN_DESC = Enable this option to allow the controller to perform command and data reordering to improve efficiency.
PARAM_CTRL_DDRX_REORDER_EN_STATUS = R

PARAM_CTRL_DDRX_MMR_EN_NAME = Enable Memory-Mapped Configuration and Status Register (MMR) Interface
PARAM_CTRL_DDRX_MMR_EN_DESC = Enable this option to allow run-time configuration and status of the memory controller. When enabled, an additional Avalon Memory-Mapped slave port is exposed. Using this slave port, you can change or read out the memory timing parameters, memory address size, mode register settings, and controller status. If Error Detection and Correction Logic is enabled, the same slave port allows you to control and retrieve the status of this logic.
PARAM_CTRL_DDRX_MMR_EN_STATUS = R

PARAM_CTRL_DDRX_RD_TO_WR_SAME_CHIP_DELTA_CYCS_NAME = Additional read-to-write turnaround time (same rank)
PARAM_CTRL_DDRX_RD_TO_WR_SAME_CHIP_DELTA_CYCS_DESC = Specifies additional number of idle controller (not DRAM) cycles when switching the data bus from a read to a write within the same logical rank. This can be used to resolve bus contention issue specific to your board topology. The value is added to the default which is auto-calculated. Rely on default setting unless you suspect an issue.
PARAM_CTRL_DDRX_RD_TO_WR_SAME_CHIP_DELTA_CYCS_STATUS = R

PARAM_CTRL_DDRX_WR_TO_RD_SAME_CHIP_DELTA_CYCS_NAME = Additional write-to-read turnaround time (same rank)
PARAM_CTRL_DDRX_WR_TO_RD_SAME_CHIP_DELTA_CYCS_DESC = Specifies additional number of idle controller (not DRAM) cycles when switching the data bus from a write to a read within the same logical rank. This can be used to resolve bus contention issue specific to your board topology. The value is added to the default which is auto-calculated. Rely on default setting unless you suspect an issue.
PARAM_CTRL_DDRX_WR_TO_RD_SAME_CHIP_DELTA_CYCS_STATUS = R

PARAM_CTRL_DDRX_RD_TO_RD_DIFF_CHIP_DELTA_CYCS_NAME = Additional read-to-read turnaround time (different ranks)
PARAM_CTRL_DDRX_RD_TO_RD_DIFF_CHIP_DELTA_CYCS_DESC = Specifies additional number of idle controller (not DRAM) cycles when switching the data bus from a read of one logical rank to a read of another logical rank. This can be used to resolve bus contention issue specific to your board topology. The value is added to the default which is auto-calculated. Rely on default setting unless you suspect an issue.
PARAM_CTRL_DDRX_RD_TO_RD_DIFF_CHIP_DELTA_CYCS_STATUS = R

PARAM_CTRL_DDRX_RD_TO_WR_DIFF_CHIP_DELTA_CYCS_NAME = Additional read-to-write turnaround time (different ranks)
PARAM_CTRL_DDRX_RD_TO_WR_DIFF_CHIP_DELTA_CYCS_DESC = Specifies additional number of idle controller (not DRAM) cycles when switching the data bus from a read of one logical rank to a write of another logical rank. This can be used to resolve bus contention issue specific to your board topology. The value is added to the default which is auto-calculated. Rely on default setting unless you suspect an issue.
PARAM_CTRL_DDRX_RD_TO_WR_DIFF_CHIP_DELTA_CYCS_STATUS = R

PARAM_CTRL_DDRX_WR_TO_WR_DIFF_CHIP_DELTA_CYCS_NAME = Additional write-to-write turnaround time (different ranks)
PARAM_CTRL_DDRX_WR_TO_WR_DIFF_CHIP_DELTA_CYCS_DESC = Specifies additional number of idle controller (not DRAM) cycles when switching the data bus from a write of one logical rank to a write of another logical rank. This can be used to resolve bus contention issue specific to your board topology. The value is added to the default which is auto-calculated. Rely on default setting unless you suspect an issue.
PARAM_CTRL_DDRX_WR_TO_WR_DIFF_CHIP_DELTA_CYCS_STATUS = R

PARAM_CTRL_DDRX_WR_TO_RD_DIFF_CHIP_DELTA_CYCS_NAME = Additional write-to-read turnaround time (different ranks)
PARAM_CTRL_DDRX_WR_TO_RD_DIFF_CHIP_DELTA_CYCS_DESC = Specifies additional number of idle controller (not DRAM) cycles when switching the data bus from a write of one logical rank to a read of another logical rank. This can be used to resolve bus contention issue specific to your board topology. The value is added to the default which is auto-calculated. Rely on default setting unless you suspect an issue.
PARAM_CTRL_DDRX_WR_TO_RD_DIFF_CHIP_DELTA_CYCS_STATUS = R

