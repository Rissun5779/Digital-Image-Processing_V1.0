PARAM_MEM_DDR3_NUM_OF_DIMMS_NAME = Number of DIMMs
PARAM_MEM_DDR3_NUM_OF_DIMMS_DESC = Total number of DIMMs.
PARAM_MEM_DDR3_NUM_OF_DIMMS_STATUS = R

PARAM_MEM_DDR3_RANKS_PER_DIMM_NAME = Number of physical ranks per DIMM
