PARAM_MEM_DDR3_RM_WIDTH_NAME = Number of rank multiplication pins
PARAM_MEM_DDR3_RM_WIDTH_DESC = Number of rank multiplication pins used to access all the physical ranks on an LRDIMM. These pins should be connected to CS#[2] and/or CS#[3] of all LRDIMMs in the system.
