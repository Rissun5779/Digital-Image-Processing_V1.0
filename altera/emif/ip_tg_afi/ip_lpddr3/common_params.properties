PARAM_BOARD_DDR3_MAX_CK_DELAY_NS_NAME = Maximum CK delay to DIMM/device
PARAM_BOARD_DDR3_MAX_CK_DELAY_NS_DESC = The delay of the longest CK trace from the FPGA to any DIMM/device.
PARAM_BOARD_DDR3_MAX_CK_DELAY_NS_STATUS = R

PARAM_BOARD_DDR3_MAX_DQS_DELAY_NS_NAME = Maximum DQS delay to DIMM/device
PARAM_BOARD_DDR3_MAX_DQS_DELAY_NS_DESC = The delay of the longest DQS trace from the FPGA to any DIMM/device.
PARAM_BOARD_DDR3_MAX_DQS_DELAY_NS_STATUS = R

PARAM_BOARD_DDR3_SKEW_BETWEEN_DIMMS_NS_NAME = Maximum delay difference between DIMMs/devices
PARAM_BOARD_DDR3_SKEW_BETWEEN_DIMMS_NS_DESC = The largest propagation delay on DQ signals between ranks.	For example, in a two-rank configuration where you place DIMMs in different slots there is an extra propagation delay for DQ signals going to and coming back from the furthest DIMM compared to the nearest DIMM.  This parameter is only applicable when there is more than one rank.
PARAM_BOARD_DDR3_SKEW_BETWEEN_DIMMS_NS_STATUS = R

PARAM_BOARD_DDR3_IS_SKEW_WITHIN_DQS_DESKEWED_NAME = Package deskewed with board layout (DQS group)
PARAM_BOARD_DDR3_IS_SKEW_WITHIN_DQS_DESKEWED_DESC = Check this if your board layout compensates for skew on DQ and DM pins in the FPGA package.
PARAM_BOARD_DDR3_IS_SKEW_WITHIN_DQS_DESKEWED_STATUS = R

PARAM_BOARD_DDR3_BRD_SKEW_WITHIN_DQS_NS_NAME = Maximum board skew within DQS group
PARAM_BOARD_DDR3_BRD_SKEW_WITHIN_DQS_NS_DESC = The largest skew between all DQ and DM pins in a DQS group. Enter your board skew only. Package skew will be calculated automatically, based on the memory interface configuration, and added to this value. This value affects the read capture and write margins.
PARAM_BOARD_DDR3_BRD_SKEW_WITHIN_DQS_NS_STATUS = R

PARAM_BOARD_DDR3_PKG_BRD_SKEW_WITHIN_DQS_NS_NAME = Maximum system skew within DQS group
PARAM_BOARD_DDR3_PKG_BRD_SKEW_WITHIN_DQS_NS_DESC = The largest skew between all DQ and DM pins in a DQS group. Enter combined board and package skew. This value affects the read capture and write margins.
PARAM_BOARD_DDR3_PKG_BRD_SKEW_WITHIN_DQS_NS_STATUS = R

PARAM_BOARD_DDR3_SKEW_BETWEEN_DQS_NS_NAME = Maximum skew between DQS groups
PARAM_BOARD_DDR3_SKEW_BETWEEN_DQS_NS_DESC = The largest skew between DQS signals in different DQS groups.
PARAM_BOARD_DDR3_SKEW_BETWEEN_DQS_NS_STATUS = R

PARAM_BOARD_DDR3_IS_SKEW_WITHIN_AC_DESKEWED_NAME = Package deskewed with board layout (address/command bus)
PARAM_BOARD_DDR3_IS_SKEW_WITHIN_AC_DESKEWED_DESC = Check this if your board layout compensates for skew on address and command pins in the FPGA package.
PARAM_BOARD_DDR3_IS_SKEW_WITHIN_AC_DESKEWED_STATUS = R

PARAM_BOARD_DDR3_BRD_SKEW_WITHIN_AC_NS_NAME = Maximum board skew within address/command bus
PARAM_BOARD_DDR3_BRD_SKEW_WITHIN_AC_NS_DESC = The largest skew between the address and command signals. Enter your board skew only. Package skew will be calculated automatically, based on the memory interface configuration, and added to this value.
PARAM_BOARD_DDR3_BRD_SKEW_WITHIN_AC_NS_STATUS = R

PARAM_BOARD_DDR3_PKG_BRD_SKEW_WITHIN_AC_NS_NAME = Maximum system skew within address/command bus
PARAM_BOARD_DDR3_PKG_BRD_SKEW_WITHIN_AC_NS_DESC = The largest skew between the address and command signals. Enter combined board and package skew.
PARAM_BOARD_DDR3_PKG_BRD_SKEW_WITHIN_AC_NS_STATUS = R

PARAM_BOARD_DDR3_AC_TO_CK_SKEW_NS_NAME = Average delay difference between address/command and CK
PARAM_BOARD_DDR3_AC_TO_CK_SKEW_NS_DESC = The average delay difference between the address and command signals and the CK signal, calculated by averaging the longest and smallest Address/Command signal delay minus the CK delay. Positive values represent address and command signals that are longer than CK signals and negative values represent address and command signals that are shorter than CK signals. The Quartus Prime software uses this skew to optimize the delay of the address and command signals to have appropriate setup and hold margins.
PARAM_BOARD_DDR3_AC_TO_CK_SKEW_NS_STATUS = R

PARAM_BOARD_DDR3_DQS_TO_CK_SKEW_NS_NAME = Average delay difference between DQS and CK
PARAM_BOARD_DDR3_DQS_TO_CK_SKEW_NS_DESC = The average delay difference between the DQS signals and the CK signal, calculated by averaging the longest and smallest DQS delay minus the CK delay. Positive values represent DQS signals that are longer than CK signals and negative values represent DQS signals that are shorter than CK signals. The Quartus Prime software uses this skew to optimize the delay of the DQS signals to have appropriate setup and hold margins.
PARAM_BOARD_DDR3_DQS_TO_CK_SKEW_NS_STATUS = R

