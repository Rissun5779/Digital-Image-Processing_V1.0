PARAM_MEM_DDR3_LRDIMM_EXTENDED_CONFIG_NAME = DDR3 LRDIMM additional control words
PARAM_MEM_DDR3_LRDIMM_EXTENDED_CONFIG_DESC = Each 8-bit setting can be obtained from the LRDIMM SPD info, and should be entered in hexadecimal, starting with SPD(77-72) or SPD(83-78) on the left and ending with SPD(71-69) on the right
