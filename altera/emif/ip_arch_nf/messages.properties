################################################################################
# MESSAGES
################################################################################

MSG_ADDR_CMD_PIN_MAP_SCHEME_INFO = Placement of address/command pins must follow "%1".  
# TYPE = I
# STATUS = C

MSG_README_INFO = For additional documentation about the interface, consult the *_readme.txt file after generation.
# TYPE = I
# STATUS = C

MSG_CPA_OUT_1_EN = TEST_MODE: Enabling both CPA core clock outputs. An additional core clock buffer is needed.
# TYPE = W
# STATUS = C

MSG_HPS_NO_DEVICE_SELECTED = No FPGA device is selected. You must select an SoC device in the "Device Family" tab.
# TYPE = E
# STATUS = C

MSG_HPS_NOT_SOC_DEVICE = The selected device is not an SoC device. You must select an SoC device in the "Device Family" tab.
# TYPE = E
# STATUS = C

MSG_HPS_EMIF_TOO_WIDE = The selected SoC device can only support a data width of up to 32 (no ECC) or 40 (with ECC).
# TYPE = E
# STATUS = C

MSG_HPS_NON_ECC_WIDTH_NOT_SUPPORTED = Hard Processor Subsystem (HPS) memory interfaces must have width of 16, 32, or 64 when ECC is not enabled.
# TYPE = E
# STATUS = C

MSG_HPS_ECC_WIDTH_NOT_SUPPORTED = Hard Processor Subsystem (HPS) memory interfaces must have width of 24, 40, or 72 when ECC is enabled.
# TYPE = E
# STATUS = C

MSG_HPS_ECC_REORDER_ALWAYS_ENABLED = When ECC is enabled in Hard Processor Subsystem (HPS), hard memory controller reordering is always enabled
# TYPE = E
# STATUS = C

MSG_HPS_X4_GROUP_NOT_SUPPORTED = Hard Processor Subsystem (HPS) memory interfaces can only support x8 data groups. That is, DQ pins per DQS group must be 8.
# TYPE = E
# STATUS = C

MSG_HPS_NO_DM_NOT_SUPPORTED = Hard Processor Subsystem (HPS) memory interfaces require DM pins to be enabled.
# TYPE = E
# STATUS = C

MSG_HPS_4_AC_LANES_NOT_SUPPORTED = Current interface configuration requires 4 I/O lanes for address/command signals, but Hard Processor Subsystem can only support up to 3 address/command I/O lanes.
# TYPE = E
# STATUS = C

MSG_USE_HMC_RC = PHY and controller running at 2x the frequency of user logic for improved efficiency.
# TYPE = I
# STATUS = C

MSG_USE_PHY_TRACKING = Circuitry to dynamically track read capture clock/strobe timing variation over time is enabled for improved read capture I/O timing.
# TYPE = I
# STATUS = C

MSG_USE_SPARSE_X4 = The selected device does not allow an I/O lane to be shared by two x4 DQS groups. To enable a more compact pinout, target a production device which supports sharing.
# TYPE = W
# STATUS = C

MSG_ALERT_N_AC_PIN_OCCUPIED = Cannot place ALERT# at pin %1 of A/C lane %2 since it is already occupied by another A/C pin.
# TYPE = E
# STATUS = C

MSG_INVALID_ALERT_N_AC_LANE = Cannot place ALERT# in A/C lane %1 since it is out of range of the availabe A/C lanes 0 to %2.
# TYPE = E
# STATUS = C

MSG_INVALID_ALERT_N_DQS_GROUP = Cannot place ALERT# in DQS group %1 since the group value is out of range.
# TYPE = E
# STATUS = C

MSG_ALERT_N_DQS_GROUP_FULL = Cannot place ALERT# in DQS group %1 because the lane is fully occupied.
# TYPE = E
# STATUS = C

MSG_BELOW_MIN_WL_HMC = The current effective write latency of %1 memory cycles is below the minimum supported of %2 for a quarter-rate interface using the hard memory controller. 
# TYPE = E
# STATUS = C

MSG_HMC_CK_WIDTH_GT_LOGICAL_RANKS = The number of clock (CK/CK#) pairs must be less than or equal to the number of logical ranks when the hard memory controller is used.
# TYPE = E
# STATUS = C

MSG_X4_NOT_SUPPORTED_BY_NF5_ES = x4 is not supported by ES devices of 10AX090, 10AX115, 10AT115 and 10AT090.
# TYPE = E
# STATUS = C

MSG_SEPARATE_RZQS_REQUIRED_FOR_USERMODE_OCT = The selected device requires that every interface in a master/slave sharing configuration use a separate RZQ resistor.  Please enable individual RZQ resistors for each interface under the Diagnostics tab, or select a device that does not require the User-Mode OCT workaround./
# TYPE = E
# STATUS = C

MSG_PLL_EXTRA_CLKS_NOT_ALLOWED = Extra core clocks cannot be generated when PLL VCO frequency is below %1 MHz. Current interface configuration requires PLL VCO to run at %2 MHz.
# TYPE = E
# STATUS = C

MSG_RESOURCE_USAGE = Interface estimated to require %1 I/O Bank(s) and %2 I/O PLL(s). This is only an estimation. Final usage depends on user pin location assignments and/or fitter behavior.
# TYPE = I
# STATUS = C

MSG_LEGAL_MEM_CLK_FREQS = Valid memory frequencies for the current PLL reference clock and user clock rate, in MHz: %1
# TYPE = I
# STATUS = C

MSG_EXCEED_HMC_FMAX = Interface requires running the memory controller at an internal clock rate of %1 MHz, but the selected device can only support up to %2 MHz.  Either reduce the speed of the memory interface, or select a faster device speed grade.
# TYPE = W
# STATUS = C

MSG_PERIODIC_OCT_RECAL_ENABLED = Periodic OCT re-calibration is enabled to improve I/O timing margins. This option can be disabled to improve traffic efficiency at the expense of I/O timing margin. Refer to the EMIF Handbook and I/O Timing reports for additional information.
# TYPE = I
# STATUS = C

MSG_PERIODIC_OCT_RECAL_DISABLED_DUE_TO_PROTOCOL_DEVICE_COMBO = Periodic OCT re-calibration is disabled because it is not supported by the current combination of memory protocol and FPGA device. OCT will be calibrated once during device power-on.
# TYPE = I
# STATUS = C

MSG_PERIODIC_OCT_RECAL_DISABLED_DUE_TO_NON_HMC = Periodic OCT re-calibration is disabled because it is only supported when the Hard Memory Controller is used.
# TYPE = I
# STATUS = C

MSG_PERIODIC_OCT_RECAL_DISABLED_DUE_TO_PINGPONG = Periodic OCT re-calibration is disabled because it is not supported by the Ping-Pong PHY.
# TYPE = I
# STATUS = C

MSG_PERIODIC_OCT_RECAL_DISABLED_DUE_TO_MMR_EN = Periodic OCT re-calibration is disabled because the Memory-Mapped Configuration and Status Register (MMR) interface is enabled.
# TYPE = I
# STATUS = C

MSG_PERIODIC_OCT_RECAL_DISABLED_DUE_TO_NON_OCT = Periodic OCT re-calibration is disabled because the interface does not require OCT.
# TYPE = I
# STATUS = C

MSG_PERIODIC_OCT_RECAL_DISABLED_DUE_TO_CALIBRATED_AC_CK = Periodic OCT re-calibration is disabled because the interface uses calibrated IO standards for either Address, Command or Clock signals.
# TYPE = I
# STATUS = C

MSG_PERIODIC_OCT_RECAL_DISABLED_DUE_TO_RDIMM_LRDIMM = Periodic OCT re-calibration is disabled because the interface uses RDIMM or LRDIMM memory format.
# TYPE = I
# STATUS = C


