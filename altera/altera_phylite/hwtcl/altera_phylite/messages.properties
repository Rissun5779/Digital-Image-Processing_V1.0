################################################################################
# ERROR MESSAGES
################################################################################

MSG_INVALID_PLL_REF_CLK_FREQ = PLL reference clock frequency of %1 MHz is invalid. Please select another value, or enable the option to use the recommended value.
# TYPE = E
# STATUS = C

MSG_BELOW_ARCH_FMIN = Interface clock frequency is below the minimum frequency of %1 MHz supported by the current device family.
# TYPE = E
# STATUS = C

MSG_ABOVE_ARCH_FMAX = Interface clock frequency is above the maximum frequency of %1 MHz supported by the current device family.
# TYPE = E
# STATUS = C

MSG_OCT_CAL_INFO = Group %1 is using calibrated OCT settings, which require the use of an RZQ pin. For more information, consult the Altera PHYLite User Guide.
# TYPE = I
# STATUS = C

MSG_BIDIR_OCT_CONFLICT = Group %1 uses bidirectional pins with calibrated and uncalibrated OCT settings. Valid setttings for bidirectional pins are both input and output OCT off (No termination) or both calibrated.
# TYPE = E
# STATUS = C

MSG_HIGH_INT_FREQ = The interface frequency is too high for this I/O standard.
# TYPE = E
# STATUS = C

MSG_MIN_CALIB_FREQ = Altera recommends using dynamic reconfiguration at %1 MHz or above
# TYPE = W
# STATUS = C

MSG_GROUP_COPY_INFO = Group %1 is copying from group %2.
# TYPE = I
# STATUS = C
