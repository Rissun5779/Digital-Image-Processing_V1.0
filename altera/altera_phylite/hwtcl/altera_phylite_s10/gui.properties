###############################################################################
# Top Level Parameters
###############################################################################

PARAM_PHYLITE_NUM_GROUPS_NAME = Number of groups
PARAM_PHYLITE_NUM_GROUPS_DESC = The number of data/strobe groups in the interface

################################################################################
# General
################################################################################

PARAM_GUI_PHYLITE_MEM_CLK_FREQ_MHZ_NAME = Interface clock frequency
PARAM_GUI_PHYLITE_MEM_CLK_FREQ_MHZ_DESC = Frequency of interface clock in MHz

PARAM_GUI_PLL_USE_CORE_REF_CLK_NAME = Use core PLL reference clock connection
PARAM_GUI_PLL_USE_CORE_REF_CLK_DESC = When checked, the PLL reference clock must come from the core. Uncheck the check box if you want to specify a direct connection to a PLL reference clock pin.

PARAM_GUI_PHYLITE_DEFAULT_REF_CLK_FREQ_NAME = Use recommended PLL reference clock frequency
PARAM_GUI_PHYLITE_DEFAULT_REF_CLK_FREQ_DESC = When checked, the PLL reference clock frequency is automatically calculated for best performance. Uncheck the check box if you want to specify your own PLL reference clock frequency.

PARAM_GUI_PHYLITE_USER_REF_CLK_FREQ_MHZ_NAME = PLL reference clock frequency
PARAM_GUI_PHYLITE_USER_REF_CLK_FREQ_MHZ_DESC = PLL reference clock frequency. You must select a valid PLL reference clock frequency from the list. The values in the list can change if you change the the memory interface frequency and/or the clock rate of user logic.

PARAM_PHYLITE_VCO_CLK_FREQ_MHZ_DISPLAY_NAME = VCO clock frequency 
PARAM_PHYLITE_VCO_CLK_FREQ_MHZ_DISPLAY_DESC = Calculated VCO clock frequency based on the interface clock frequency.

PARAM_PHYLITE_REF_CLK_FREQ_MHZ_NAME = PLL reference clock frequency
PARAM_PHYLITE_REF_CLK_FREQ_MHZ_DESC = PLL reference clock frequency. You must feed a clock of this frequency to the PLL reference clock input of the memory interface.

PARAM_GUI_PHYLITE_RATE_ENUM_NAME = Clock rate of user logic
PARAM_GUI_PHYLITE_RATE_ENUM_DESC = Determines the clock frequency of user logic in relation to the interface clock frequency. For example, if the interface clock sent from the FPGA to the memory device is toggling at 800MHz, a "Quarter rate" interface means that the user logic in the FPGA runs at 200MHz.

PARAM_GUI_PHYLITE_USE_DYNAMIC_RECONFIGURATION_NAME = Use dynamic reconfiguration
PARAM_GUI_PHYLITE_USE_DYNAMIC_RECONFIGURATION_DESC = Expose an Avalon-MM interface to allow for user controlled configuration of the Altera PHYLite settings.

PARAM_GUI_PHYLITE_GENERATE_DEBUG_DESIGN_NAME = Generate PHYLite debug example design 
PARAM_GUI_PHYLITE_GENERATE_DEBUG_DESIGN_DESC = Generate a PHYLite debug example design.

PARAM_GUI_PHYLITE_USE_PHYLITE_AVL_CONTROLLER_NAME = Use PHYLite Avalon controller 
PARAM_GUI_PHYLITE_USE_PHYLITE_AVL_CONTROLLER_DESC = Use the PHYLite Avalon controller for address translation.

PARAM_GUI_PHYLITE_INTERFACE_ID_NAME = Interface ID
PARAM_GUI_PHYLITE_INTERFACE_ID_DESC = The ID used to identify this interface in the column over the Avalon-MM bus.

PARAM_GUI_PHYLITE_IO_STD_ENUM_NAME = I/O standard
PARAM_GUI_PHYLITE_IO_STD_ENUM_DESC = Specifies the I/O standard of the interface's strobe and data pins written to the IP instance's QIP file. A value of "None" leaves the I/O standard unspecified in the generated IP.

################################################################################
# Group
################################################################################

PARAM_GUI_GROUP_PARAM_COPY_NAME = Copy parameters from another group
PARAM_GUI_GROUP_PARAM_COPY_DESC = Copy the parameters from another group.

PARAM_GUI_GROUP_PARAM_COPY_GROUP_NAME = Group
PARAM_GUI_GROUP_PARAM_COPY_GROUP_DESC = The group to copy the parameters from.

PARAM_GUI_GROUP_PIN_TYPE_NAME = Pin type
PARAM_GUI_GROUP_PIN_TYPE_DESC = The direction of the data pins in the group.

PARAM_GUI_GROUP_PIN_WIDTH_NAME = Pin width
PARAM_GUI_GROUP_PIN_WIDTH_DESC = The number of data pins in the group.

PARAM_GUI_GROUP_DDR_SDR_MODE_NAME = DDR/SDR
PARAM_GUI_GROUP_DDR_SDR_MODE_DESC = Data on pins is transferred at double or single data rate.

PARAM_GUI_GROUP_STROBE_CONFIG_NAME = Strobe configuration
PARAM_GUI_GROUP_STROBE_CONFIG_DESC = Select the type of strobe. A single ended strobe uses one pin, which will reduce the maximum possible number of data pins in the group to 47. Differential/complementary strobe types use 2 pins, which will reduce the maximum possible number of data pins in the group to 46. Differential strobe uses one differential buffer while complementary strobe uses two single-ended buffers.

PARAM_GUI_GROUP_DATA_CONFIG_NAME = Data configuration
PARAM_GUI_GROUP_DATA_CONFIG_DESC = Select the pin configuration of the data. Single ended data uses one pin, which allows for a maximum group pin width of 48, depending on the strobe configuration. Differential data uses 2 pins (one positive and one negative), which allows for a maximum group pin width of 24.

PARAM_GUI_GROUP_USE_SEPARATE_STROBES_NAME = Use separate strobes
PARAM_GUI_GROUP_USE_SEPARATE_STROBES_DESC = Separate the bidirectional strobe into input and output strobe pins. Using separate strobes is only available for a bidirectional data group with the output strobe enabled.

PARAM_GUI_GROUP_SWAP_CAPTURE_STROBE_POLARITY_NAME = Swap capture strobe polarity
PARAM_GUI_GROUP_SWAP_CAPTURE_STROBE_POLARITY_DESC = Swap the positive and negative strobe inputs. Swapping the capture strobe polarity is only available for complementary strobe configurations. This is typically used by QDR style interfaces.

PARAM_GUI_GROUP_READ_LATENCY_NAME = Read latency
PARAM_GUI_GROUP_READ_LATENCY_DESC = The expected read latency of the external device in external interface clock cycles. The valid range is dependent on the user clock rate and memory interface frequency set in the General tab.

PARAM_GUI_GROUP_USE_INTERNAL_CAPTURE_STROBE_NAME = Use internal capture strobe
PARAM_GUI_GROUP_USE_INTERNAL_CAPTURE_STROBE_DESC = Use the internal interpolator clock to capture input data. This option can be used to register non-strobe based signals from the external device, such as a ready signal.

PARAM_GUI_GROUP_CAPTURE_PHASE_SHIFT_NAME = Capture strobe phase shift
PARAM_GUI_GROUP_CAPTURE_PHASE_SHIFT_DESC = The desired phase shift of the input strobe relative to the input data. For example, specifying a shift of 90 would shift edge-aligned input data/strobe to center-alignment at the read FIFO.

PARAM_GUI_GROUP_WRITE_LATENCY_NAME = Write latency
PARAM_GUI_GROUP_WRITE_LATENCY_DESC = The number of external interface clock cycles to delay the output data. The valid range is the set of sub core clock cycles, which is dependent on the user clock rate set in the General tab. To delay by a larger amount, the data should be registered in the core.

PARAM_GUI_GROUP_USE_OUTPUT_STROBE_NAME = Use output strobe
PARAM_GUI_GROUP_USE_OUTPUT_STROBE_DESC = Enable the use of an output strobe pin. The strobe is only optional for an output only group.

PARAM_GUI_GROUP_OUTPUT_STROBE_PHASE_NAME = Output strobe phase
PARAM_GUI_GROUP_OUTPUT_STROBE_PHASE_DESC = The phase relationship between the data and strobe being output from the IP.

PARAM_GUI_GROUP_DEFAULT_OCT_NAME = Use Default OCT Values
PARAM_GUI_GROUP_DEFAULT_OCT_DESC = Use default OCT values based on the current I/O standard set in the General tab.

PARAM_GUI_GROUP_OCT_SIZE_NAME = OCT enable size
PARAM_GUI_GROUP_OCT_SIZE_DESC = Select the size of the OCT enable signal.

PARAM_GUI_GROUP_IN_OCT_NAME = Input OCT Value
PARAM_GUI_GROUP_IN_OCT_DESC = Specifies the group's data and strobe input termination values to be written to the IP instance's QIP file. The list of legal values is dependent on the I/O standard set in the General tab.

PARAM_GUI_GROUP_OUT_OCT_NAME = Output OCT Value
PARAM_GUI_GROUP_OUT_OCT_DESC = Specifies the group's data and strobe output termination values to be written to the IP instance's QIP file. The list of legal values is dependent on the I/O standard set in the General tab.

PARAM_GUI_GROUP_IN_OCT_ENUM_NAME = Input OCT Value
PARAM_GUI_GROUP_IN_OCT_ENUM_DESC = Specifies the group's data and strobe input termination values to be written to the IP instance's QIP file.

PARAM_GUI_GROUP_OUT_OCT_ENUM_NAME = Output OCT Value
PARAM_GUI_GROUP_OUT_OCT_ENUM_DESC = Specifies the group's data and strobe output termination values to be written to the IP instance's QIP file.

PARAM_GUI_GROUP_T_IN_DS_NAME = Input Strobe Setup Delay Constraint
PARAM_GUI_GROUP_T_IN_DS_DESC = Specifies the group's input delay setup constraint against the input strobe to be written to the IP instance's SDC file.

PARAM_GUI_GROUP_T_IN_DH_NAME = Input Strobe Hold Delay Constraint
PARAM_GUI_GROUP_T_IN_DH_DESC = Specifies the group's input delay hold constraint against the input strobe to be written to the IP instance's SDC file.

PARAM_GUI_GROUP_T_OUT_DS_NAME = Output Strobe Setup Delay Constraint
PARAM_GUI_GROUP_T_OUT_DS_DESC = Specifies the group's output delay setup constraint against the output strobe to be written to the IP instance's SDC file.

PARAM_GUI_GROUP_T_OUT_DH_NAME = Output Strobe Hold Delay Constraint
PARAM_GUI_GROUP_T_OUT_DH_DESC = Specifies the group's output delay hold constraint against the output strobe to be written to the IP instance's SDC file.

PARAM_GUI_GROUP_GENERATE_INPUT_CONSTRAINT_NAME = Generate Input Delay Constraints for this group
PARAM_GUI_GROUP_GENERATE_INPUT_CONSTRAINT_DESC = Instructs SDC to generate set_input_delay constraints for this group. Uncheck this if you want to write your own constraints, for example, to constrain each bit differently.

PARAM_GUI_GROUP_GENERATE_OUTPUT_CONSTRAINT_NAME = Generate Output Delay Constraints for this group
PARAM_GUI_GROUP_GENERATE_OUTPUT_CONSTRAINT_DESC = Instructs SDC to generate set_output_delay constraints for this group. Uncheck this if you want to write your own constraints, for example, to constrain each bit differently.


PARAM_GUI_GROUP_READ_DESKEW_MODE_NAME = Dynamic Reconfiguration Read Deskew Algorithm
PARAM_GUI_GROUP_READ_DESKEW_MODE_DESC = Specifies the Read Deskew algorithm for the group to instruct TimeQuest how to perform I/O timing analysis.   Available when dynamic reconfiguration is enabled and pin type is input or bidirectional. <p> DQ Per-Bit Deskew: Choose this if your algorithm center aligns DQS with each individual DQ bit.  Each DQ bit may have different resulting delay chain settings.  <p> DQ Group Deskew: Choose this if your algorithm adjusts DQS and the whole DQ bus as a group so that DQS is center aligned to the DQ group.  All DQ bits will have the same resulting delay chain setting. <p> Custom: Choose this and enter your expected slack recoverable by your algorithm.

PARAM_GUI_GROUP_READ_HD_DESKEW_CUSTOM_NAME = Hold Slack Recoverable of Custom Read Deskew Algorithm
PARAM_GUI_GROUP_READ_HD_DESKEW_CUSTOM_DESC = Specifies the amount of hold slack can be recovered by the custom deskew read algorithm of the group.  Enter a positive number if your algorithm can increase hold slack.   Available when dynamic reconfiguration is enabled, pin type is input or bidirectional, and read deskew mode is Custom.

PARAM_GUI_GROUP_READ_ISI_NAME = Inter Symbol Interference of the Read Channel
PARAM_GUI_GROUP_READ_ISI_DESC = Specifies the amount of Inter Symbol Interference of the Read Channel of the group.  Enter a positive to decrease setup and hold slack by half of the entered amount.

PARAM_GUI_GROUP_READ_SU_DESKEW_CUSTOM_NAME = Setup Slack Recoverable of Custom Read Deskew Algorithm
PARAM_GUI_GROUP_READ_SU_DESKEW_CUSTOM_DESC = Specifies the amount of setup slack can be recovered by the custom deskew read algorithm of the group.  Enter a positive number if your algorithm can increase setup slack.   Available when dynamic reconfiguration is enabled, pin type is input or bidirectional, and read deskew mode is Custom.

PARAM_GUI_GROUP_WRITE_DESKEW_MODE_NAME = Dynamic Reconfiguration Write Deskew Algorithm
PARAM_GUI_GROUP_WRITE_DESKEW_MODE_DESC = Specifies the Write Deskew algorithm for the group to instruct TimeQuest how to perform I/O timing analysis.   Available when dynamic reconfiguration is enabled and pin type is output or bidirectional. <p> DQ Per-Bit Deskew: Choose this if your algorithm center aligns DQS with each individual DQ bit.  Each DQ bit may have different resulting delay chain settings.  <p> DQ Group Deskew: Choose this if your algorithm adjusts DQS and the whole DQ bus as a group so that DQS is center aligned to the DQ group.  All DQ bits will have the same resulting delay chain setting. <p> Custom: Choose this and enter your expected slack recoverable by your algorithm.

PARAM_GUI_GROUP_WRITE_HD_DESKEW_CUSTOM_NAME = Hold Slack Recoverable of Custom Write Deskew Algorithm
PARAM_GUI_GROUP_WRITE_HD_DESKEW_CUSTOM_DESC = Specifies the amount of hold slack can be recovered by the custom deskew write algorithm of the group.  Enter a positive number if your algorithm can increase hold slack.   Available when dynamic reconfiguration is enabled, pin type is output or bidirectional, and write deskew mode is Custom.

PARAM_GUI_GROUP_WRITE_ISI_NAME = Inter Symbol Interference of the Write Channel
PARAM_GUI_GROUP_WRITE_ISI_DESC = Specifies the amount of Inter Symbol Interference of the Write Channel of the group.  Enter a positive to decrease setup and hold slack by half of the entered amount.

PARAM_GUI_GROUP_WRITE_SU_DESKEW_CUSTOM_NAME = Setup Slack Recoverable of Custom Write Deskew Algorithm
PARAM_GUI_GROUP_WRITE_SU_DESKEW_CUSTOM_DESC = Specifies the amount of setup slack can be recovered by the custom deskew write algorithm of the group.  Enter a positive number if your algorithm can increase setup slack.   Available when dynamic reconfiguration is enabled, pin type is output or bidirectional, and write deskew mode is Custom.

